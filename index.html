<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flatgym">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<title>Flatgym 训练日志</title>
<style>
  :root {
    --bg: #0f172a; --sf: #1e293b; --bd: #334155; --tx: #e2e8f0;
    --tx2: #94a3b8; --mt: #64748b; --dm: #475569; --dp: #020617;
    --ac: #0ea5e9; --gn: #166534; --am: #f59e0b; --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--tx); min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }
  .ct { max-width: 520px; margin: 0 auto; padding: 20px 16px 110px; }
  /* bottom tab bar */
  .tabs {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: var(--sf); border-top: 1px solid var(--bd);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 10px 6px 8px; background: none; border: none; color: var(--tx2);
    cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500;
  }
  .tab .temo { font-size: 20px; line-height: 1; }
  .tab.active { color: var(--ac); }
  .tab:active { background: var(--dp); }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .ver { font-size: 12px; font-weight: 400; color: var(--mt); margin-left: 8px; letter-spacing: 0; vertical-align: middle; }
  .sub { font-size: 14px; color: var(--mt); margin: 4px 0 24px; }
  /* grid */
  .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  /* .pcell is the grid item; .pbtn fills it; .pedit overlays in the corner.
     This split lets .pedit be a real <button> instead of a nested span,
     since nested buttons are invalid HTML. */
  .pcell { position: relative; display: flex; }
  .pbtn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 22px 12px; background: var(--sf); border: 1px solid var(--bd);
    border-radius: var(--r); cursor: pointer; color: var(--tx); font-family: inherit;
    transition: transform .1s; font-size: 14px;
  }
  .pbtn:active { transform: scale(.97); }
  .pemo { font-size: 32px; }
  .plab { font-size: 15px; font-weight: 600; }
  .plast { font-size: 11px; color: var(--mt); font-family: monospace; }
  .pedit {
    position: absolute; top: 6px; right: 6px; padding: 4px 6px;
    font-size: 13px; opacity: 0.45; border-radius: 6px; line-height: 1;
    background: none; border: none; color: inherit; cursor: pointer;
    font-family: inherit;
  }
  .pedit:hover, .pedit:active { opacity: 1; background: var(--dp); }
  /* preset editor (v0.6) */
  .pe-head { display: grid; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 18px; }
  .pe-emoji { font-size: 22px; width: 80px; text-align: center; }
  .pe-label { width: 100%; text-align: left; padding-left: 10px; }
  .pe-sec { font-size: 13px; font-weight: 600; color: var(--tx2); text-transform: uppercase; letter-spacing: 0.05em; margin: 4px 0 8px; }
  .pe-row {
    display: flex; align-items: center; gap: 6px; padding: 10px 8px;
    background: var(--sf); border: 1px solid var(--bd); border-radius: 8px; margin-bottom: 6px;
  }
  .pe-name {
    flex: 1; color: var(--tx); cursor: pointer; padding: 4px 2px;
    background: none; border: none; font: inherit; text-align: left;
  }
  .pe-btn {
    background: none; border: 1px solid var(--bd); color: var(--tx2);
    padding: 4px 8px; border-radius: 6px; cursor: pointer; font-family: inherit;
    font-size: 13px;
  }
  .pe-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
  .pe-btn:hover:not([disabled]) { background: var(--dp); color: var(--tx); }
  .pe-rm { color: #fca5a5; border-color: #7f1d1d; }
  /* nav */
  .nbtn {
    width: 100%; padding: 14px; background: none; border: 1px solid var(--bd);
    border-radius: 10px; color: var(--tx2); font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: inherit; margin-bottom: 8px;
  }
  .rbtn {
    display: block; margin: 8px auto 0; background: none; border: none;
    color: var(--dm); font-size: 13px; cursor: pointer; font-family: inherit;
  }
  /* workout */
  .whdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .bbtn {
    background: none; border: none; color: var(--tx2); font-size: 14px;
    cursor: pointer; padding: 4px 0; font-family: inherit;
  }
  .din {
    background: var(--sf); border: 1px solid var(--bd); border-radius: 8px;
    color: var(--tx); padding: 6px 10px; font-size: 14px; font-family: monospace;
    color-scheme: dark;
  }
  .wtit { font-size: 22px; font-weight: 700; margin: 0 0 20px; }
  /* card */
  .card {
    background: var(--sf); border: 1px solid var(--bd);
    border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px;
  }
  .card-c { border-left: 3px solid var(--am); }
  .card-sh { border-left: 3px solid var(--am); }
  .chead { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .ctit { font-size: 16px; font-weight: 600; }
  .sh-badge { font-size: 11px; font-weight: 600; color: var(--am); margin-top: 2px; }
  .sh-annot { font-size: 12px; color: var(--am); margin: -4px 0 8px; font-weight: 500; }
  .shift-ex {
    flex-shrink: 0; background: none; border: 1px solid var(--bd);
    border-radius: 6px; color: var(--am); padding: 3px 8px;
    font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .chead-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .alt-ex {
    flex-shrink: 0; background: none; border: 1px solid var(--bd);
    border-radius: 6px; color: var(--ac); padding: 3px 8px;
    font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .lt {
    display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; color: var(--mt);
    font-family: monospace; margin-bottom: 10px; padding: 6px 8px;
    background: var(--dp); border-radius: 6px;
  }
  .ltl { color: var(--dm); font-weight: 500; }
  /* sets */
  .sr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .sn { font-size: 12px; font-weight: 600; color: var(--dm); width: 24px; font-family: monospace; }
  .ni {
    width: 72px; padding: 8px; background: var(--dp); border: 1px solid var(--bd);
    border-radius: 6px; color: var(--tx); font-size: 16px; font-family: monospace;
    text-align: center; -moz-appearance: textfield;
  }
  .ni::-webkit-outer-spin-button, .ni::-webkit-inner-spin-button { -webkit-appearance: none; }
  .mul { color: var(--dm); font-size: 14px; font-weight: 700; }
  .sgn {
    background: var(--dp); border: 1px solid var(--bd); color: var(--tx2); cursor: pointer;
    font-size: 14px; font-weight: 700; padding: 6px 8px; border-radius: 6px;
    font-family: inherit; line-height: 1;
  }
  .sgn.on { color: var(--am); border-color: var(--am); }
  .xbtn {
    background: none; border: none; color: var(--dm); cursor: pointer;
    font-size: 14px; padding: 4px 6px; margin-left: auto;
  }
  .abtn {
    width: 100%; padding: 10px; background: none; border: 1px dashed var(--bd);
    border-radius: 8px; color: var(--mt); font-size: 13px; cursor: pointer;
    margin-top: 4px; font-family: inherit;
  }
  /* cardio */
  .cgrid { display: grid; grid-template-columns: 1fr 80px 80px; gap: 10px; }
  .fg { display: flex; flex-direction: column; gap: 4px; }
  .fl {
    font-size: 11px; font-weight: 600; color: var(--dm);
    text-transform: uppercase; letter-spacing: .05em;
  }
  .sel {
    padding: 8px; background: var(--dp); border: 1px solid var(--bd);
    border-radius: 6px; color: var(--tx); font-size: 14px; font-family: inherit;
    color-scheme: dark;
  }
  /* save */
  .svbtn {
    width: 100%; padding: 16px; border: none; border-radius: var(--r);
    color: white; font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 16px; font-family: inherit; transition: background .2s;
  }
  /* history */
  .htit { font-size: 22px; font-weight: 700; margin: 8px 0 20px; }
  .he {
    background: var(--sf); border: 1px solid var(--bd);
    border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
  }
  .hh {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--bd);
  }
  .hd { font-size: 14px; font-weight: 600; font-family: monospace; }
  .hp { font-size: 14px; font-weight: 600; }
  .hx {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 4px; padding: 4px 0; font-size: 13px;
  }
  .hn { font-weight: 500; color: #cbd5e1; }
  .hn-alt { font-weight: 400; color: var(--mt); font-size: 11px; }
  .alt-row { display: flex; align-items: stretch; gap: 6px; margin-bottom: 8px; }
  .alt-rm {
    background: none; border: 1px solid var(--bd); color: #fca5a5;
    border-radius: 8px; padding: 0 12px; cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .alt-rm:hover, .alt-rm:active { background: var(--dp); }
  .hs { color: var(--mt); font-family: monospace; font-size: 12px; }
  .ebar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .empty { color: var(--mt); text-align: center; margin-top: 40px; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #166534; color: white; padding: 12px 24px; border-radius: 10px;
    font-size: 14px; font-weight: 600; z-index: 999; animation: fadein .3s;
  }
  @keyframes fadein { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
  /* draft resume banner */
  .draft {
    background: #78350f; border: 1px solid #92400e; border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .draft-lbl { flex: 1; min-width: 180px; font-size: 13px; color: #fde68a; }
  .draft button {
    padding: 6px 12px; border: 1px solid var(--bd); border-radius: 6px;
    background: var(--sf); color: var(--tx); font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  /* workout duration chip in history header (v0.13) */
  .hp-dur {
    font-size: 11px; color: var(--mt); font-weight: 400;
    margin-left: 6px;
  }
  /* workout notes (v0.12) */
  .card-notes { padding: 12px 14px; }
  .notes-ta {
    width: 100%; padding: 8px 10px; resize: vertical;
    background: var(--dp); border: 1px solid var(--bd); border-radius: 6px;
    color: var(--tx); font-size: 14px; font-family: inherit;
    box-sizing: border-box; min-height: 44px;
  }
  .notes-ta::placeholder { color: var(--mt); }
  .hn-notes {
    color: var(--tx2); font-size: 12px; font-style: italic;
    border-left: 2px solid var(--mt); padding: 4px 0 4px 8px; margin-top: 6px;
  }
  /* rest timer pill (v0.12) */
  .rest-pill {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(72px + env(safe-area-inset-bottom));
    background: var(--ac); color: white; border-radius: 999px;
    padding: 10px 16px 10px 18px; display: flex; gap: 12px; align-items: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5); z-index: 95; font-size: 14px;
    font-variant-numeric: tabular-nums;
  }
  .rest-time { font-weight: 600; min-width: 36px; text-align: center; }
  .rest-skip {
    background: rgba(255,255,255,0.18); border: none; color: white;
    border-radius: 999px; padding: 4px 12px; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 500;
  }
  .rest-skip:hover, .rest-skip:active { background: rgba(255,255,255,0.3); }
  /* backup reminder banner (v0.10) */
  .backup-banner {
    background: #1e3a5f; border: 1px solid var(--ac); border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .backup-title { font-size: 14px; font-weight: 600; color: var(--ac); }
  .backup-sub { font-size: 12px; color: var(--tx2); line-height: 1.4; }
  .backup-actions { display: flex; gap: 8px; }
  .backup-export {
    flex: 1; padding: 8px 12px; background: var(--ac); border: 1px solid var(--ac);
    color: white; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .backup-later {
    padding: 8px 12px; background: none; border: 1px solid var(--bd);
    color: var(--tx2); border-radius: 6px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  /* settings → backup reminder cadence picker */
  .backup-cad { display: flex; flex-direction: column; gap: 6px; }
  .backup-radio { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--tx2); flex-wrap: wrap; }
  .backup-radio input[type="radio"] { accent-color: var(--ac); }
  .backup-radio .sel { padding: 4px 8px; font-size: 13px; min-width: 0; flex: 0 0 auto; }
  .backup-warn {
    margin-top: 14px; padding: 10px 12px; background: var(--dp);
    border-left: 3px solid var(--am); border-radius: 4px;
    font-size: 12px; color: var(--tx2); line-height: 1.5;
  }
  /* exercise-shift cards on home */
  .shift-card {
    background: var(--sf); border: 1px solid var(--am); border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .shift-info { flex: 1; min-width: 180px; }
  .shift-title { font-size: 15px; font-weight: 600; }
  .shift-sub { font-size: 12px; color: var(--mt); margin-top: 2px; }
  .shift-card button {
    padding: 6px 12px; border: 1px solid var(--bd); border-radius: 6px;
    background: var(--dp); color: var(--tx); font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .shift-cancel {
    padding: 4px 10px !important; border: none !important;
    background: none !important; color: var(--dm) !important;
    font-size: 16px !important;
  }
  /* cardio mode toggle */
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .mode-btn {
    flex: 1; padding: 8px; border: 1px solid var(--bd); border-radius: 6px;
    background: var(--dp); color: var(--tx2); font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .mode-btn.active { background: var(--ac); color: white; border-color: var(--ac); }
  .cardio-presets { display: flex; gap: 6px; margin-bottom: 12px; }
  .preset-btn {
    padding: 6px 10px; border: 1px solid var(--bd); border-radius: 6px;
    background: var(--dp); color: var(--am); font-size: 12px;
    cursor: pointer; font-family: inherit;
  }
  .phase-label {
    font-size: 11px; font-weight: 600; color: var(--dm);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 10px 0 4px; display: flex; align-items: center;
  }
  .phase-label.sub {
    font-weight: 500; text-transform: none; letter-spacing: 0;
    color: var(--mt); margin: 6px 0 2px 12px; font-size: 12px;
  }
  .cgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cgrid2 .ni { width: 100%; }
  /* stats (v0.4) */
  .chart {
    width: 100%; height: auto; display: block;
    background: var(--dp); border-radius: 8px; padding: 4px 6px;
    margin-bottom: 16px;
  }
  .chart .axlbl { font-size: 10px; fill: var(--mt); font-family: monospace; }
  .stats-block {
    background: var(--sf); border: 1px solid var(--bd); border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 12px;
  }
  .stats-title {
    font-size: 11px; font-weight: 600; color: var(--dm);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px;
  }
  .stats-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; font-size: 13px; gap: 12px;
    border-bottom: 1px solid var(--bd);
  }
  .stats-row:last-child { border-bottom: 0; }
  .stats-k { color: var(--tx2); }
  .stats-mini { font-size: 9px; color: var(--mt); font-weight: 400; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stats-v { color: var(--tx); font-family: monospace; font-weight: 500; text-align: right; }
  /* month calendar in Stats (v0.11) */
  .cal-block { margin-bottom: 16px; }
  .cal-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .cal-title { flex: 1; text-align: center; font-weight: 600; font-size: 14px; color: var(--tx); }
  .cal-nav {
    background: none; border: 1px solid var(--bd); color: var(--tx2);
    border-radius: 6px; padding: 4px 12px; cursor: pointer;
    font-size: 16px; font-family: inherit; line-height: 1;
  }
  .cal-nav:hover, .cal-nav:active { color: var(--tx); background: var(--dp); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-dow {
    font-size: 10px; color: var(--mt); text-align: center;
    padding: 4px 0; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .cal-cell {
    aspect-ratio: 1; background: var(--sf); border: 1px solid var(--bd);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    position: relative; font-size: 13px; color: var(--tx2);
  }
  .cal-cell.cal-empty { background: transparent; border-color: transparent; }
  .cal-cell.today { border-color: var(--ac); border-width: 2px; }
  .cal-emoji { font-size: 22px; line-height: 1; }
  .cal-emoji.multi { opacity: 0.45; }
  .cal-extra {
    position: absolute; top: 2px; right: 2px;
    font-size: 9px; font-weight: 700; color: var(--ac);
    background: var(--dp); border: 1px solid var(--ac);
    border-radius: 999px; padding: 0 4px; min-width: 16px; text-align: center;
    line-height: 1.4;
  }
  /* shift picker modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-box {
    background: var(--sf); border: 1px solid var(--bd); border-radius: var(--r);
    padding: 20px; width: 100%; max-width: 360px;
  }
  .modal-box--wide { max-width: 520px; max-height: 80vh; overflow-y: auto; overscroll-behavior: contain; }
  .share-preview { display: flex; justify-content: center; margin-bottom: 14px; }
  .share-canvas { width: 100%; max-width: 320px; height: auto; border-radius: 10px; display: block; }
  .share-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-actions .modal-opt { margin-bottom: 0; text-align: center; }
  .help-body { font-size: 13px; line-height: 1.5; color: var(--tx2); }
  .help-body b { color: var(--tx); }
  .help-body p.help-h { margin: 12px 0 4px; font-size: 12px; font-weight: 600; color: var(--ac); text-transform: uppercase; letter-spacing: 0.05em; }
  .help-body ul { margin: 0 0 6px 18px; padding: 0; }
  .help-body li { margin: 4px 0; }
  .help-p { font-size: 13px; line-height: 1.5; color: var(--tx2); }
  .help-links { list-style: none; margin: 0; padding: 0; }
  .help-links li { margin: 6px 0; }
  .help-links a { color: var(--ac); text-decoration: none; font-size: 14px; }
  .help-links a:hover { text-decoration: underline; }
  /* 有氧 stats sub-chart heading. */
  .cardio-chart-h {
    font-size: 12px; color: var(--tx2); text-transform: uppercase;
    letter-spacing: 0.05em; margin: 12px 0 4px;
  }
  /* Last-time row above first cardio block — chip + Use-last-time button. */
  .lt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .lt-row .lt { margin: 0; flex: 1 1 auto; min-width: 0; }
  .cardio-use-last {
    background: none; border: 1px solid var(--ac); color: var(--ac);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .cardio-use-last:hover, .cardio-use-last:active { background: var(--ac); color: #fff; }
  /* v0.18c: cardio-fields list in 设置. */
  .cardio-fields-list { display: flex; flex-direction: column; gap: 4px; }
  .cardio-field-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; background: var(--dp); border: 1px solid var(--bd);
    border-radius: 6px; cursor: pointer; user-select: none;
  }

function ld() {
  let h;
  try { h = JSON.parse(localStorage.getItem("gym")) || []; } catch { return []; }

  if (changed) localStorage.setItem("gym", JSON.stringify(h));
  return h;

// invalid. 体重 comes in user-display units (kg or lb); converts here.
function estimate卡路里(metKey, bodyweight, minutes, isImperial) {

// or null when any input is invalid. Distance/time units are caller-determined

// 10K, marathon to half, etc.

}

// nested interval shape used in-app. We assume every work round has the
// same minutes/level (and likewise for rest), since that's what the UI lets
// the user enter — first work row sets the work template, count is
// derived from how many work rows arrived.

  const work = blocks.filter(b => b.phase === "work");
  const rest = blocks.filter(b => b.phase === "rest");
  c.warmup = warmup ? { minutes: warmup.minutes, level: warmup.level } : null;
  c.cooldown = cooldown ? { minutes: cooldown.minutes, level: cooldown.level } : null;

    count: String(work.length),
    work: { minutes: work[0].minutes, level: work[0].level },
    rest: rest.length ? { minutes: rest[0].minutes, level: rest[0].level } : { minutes: "", level: "" },
  } : null;
  return c;
}

// CSV cell escape (RFC 4180 + formula-injection mitigation).
// - If the cell starts with =, +, -, @, or a tab character, prepend a single
//   quote so Excel/Sheets/Numbers don't interpret it as a formula. (Standard
//   OWASP-recommended defence against CSV injection.)

  if (/^[=+\-@\t]/.test(s)) s = "'" + s;

}

// IMPORTANT: any new column must be APPENDED at the end of the header. Legacy
// CSVs exported by earlier versions destructure by position in fromCSV, so
// trailing-only additions stay backward-compatible.
function toCSV(hist) {

    const d = w.date, p = w.preset;
    if (w.exercises) {
      for (const ex of w.exercises) {
        if (ex.sets?.length) {
          ex.sets.forEach((s, i) => {
            rows.push(`${d},${p},${csvCell(ex.name)},${i+1},${csvCell(s.weight)},${csvCell(s.reps)},,,,,,,,,,,,,,,`);
          });
        }

    }

    // bridged via get有氧s. Each block's row(s) carry the session-index
    // in cardio_block_index — for interval blocks the value is encoded as
    // `<sess>.<phase>` (e.g. "0.0", "0.1", "1.0") to keep both axes in
    // one column. Old CSVs have plain integers and still parse on import.

        blocks.forEach((b, phaseIdx) => {
          const idxCell = `${sessIdx}.${phaseIdx}`;
          const distCell = phaseIdx === 0 ? csvCell(c.distance || "") : "";
          const distUnitCell = phaseIdx === 0 ? csvCell(c.distanceUnit || "") : "";
          const extrasCell = phaseIdx === 0 ? csvCell(extrasJSON) : "";

        });
      } else if (c.type) {
        rows.push(`${d},${p},cardio,,,,${csvCell(c.type)},${csvCell(c.time || "")},${csvCell(c.difficulty || "")},steady,,${sessIdx},,,,,,,${csvCell(c.distance || "")},${csvCell(c.distanceUnit || "")},${csvCell(extrasJSON)}`);
      }

    // those survive a CSV round-trip. Older importers ignore unknown exercise
    // names and just skip the row, so this stays backward-compatible.

    const dur = w.duration || 0;

    }

  // v0.8.4: append body measurements. date only (no preset); body_* fields hold the payload.
  for (const e of ldBody()) {
    rows.push(`${e.date},,body,,,,,,,,,,${csvCell(e.name)},${csvCell(e.value)},${csvCell(e.unit || "")},,,,,,`);
  }
  // v0.16: round-trip preset definitions, alternatives map, and small singleton
  // settings so users don't lose custom presets / emojis / remembered alts when
  // they wipe and re-import. The payload column (last) carries a small JSON blob.
  // Rows are emitted with `exercise = preset_def | alt_def | settings` so older
  // importers (which only know about exercise/cardio/meta/body) skip them
  // silently — backward-compatible.
  const todayStr = tod();
  for (const [key, def] of Object.entries(P)) {
    const payload = JSON.stringify({ label: def.label, emoji: def.emoji, ex: def.ex || [], cardio: def.cardio !== false });
    rows.push(`${todayStr},${csvCell(key)},preset_def,,,,,,,,,,,,,,,${csvCell(payload)},,,`);
  }
  const alts = ldAlts();
  if (Object.keys(alts).length) {
    rows.push(`${todayStr},,alt_def,,,,,,,,,,,,,,,${csvCell(JSON.stringify(alts))},,,`);

    rest: ldRest(),
    backup: ldBackup(),
    cardioFields: ld有氧Fields(),   // v0.18c

  rows.push(`${todayStr},,settings,,,,,,,,,,,,,,,${csvCell(JSON.stringify(settings))},,,`);

      const idxStr = cBlockIdx || "";
      const dot = idxStr.indexOf(".");
      const sessIdx = dot >= 0 ? (parseInt(idxStr.slice(0, dot)) || 0) : (cMode === "interval" ? 0 : (parseInt(idxStr) || 0));
      const phaseIdx = dot >= 0 ? (parseInt(idxStr.slice(dot + 1)) || 0) : (cMode === "interval" ? (parseInt(idxStr) || 0) : 0);
      // v0.18c: extras JSON sits on the first row of a block (warmup phase
      // for interval, the only row for steady). Decode defensively.
      let extrasParsed = null;
      if (cExtras) { try { const e = JSON.parse(cExtras); if (e && typeof e === "object") extrasParsed = e; } catch {} }
      if (cMode === "interval") {
        const blockKey = `${key}|${sessIdx}`;
        if (!blocksByKey[blockKey]) blocksByKey[blockKey] = { sessIdx, type: cType || "", phases: [], distance: "", distanceUnit: "", extras: null };
        blocksByKey[blockKey].phases.push({ phase: cPhase || "", minutes: cMin || "", level: cDiff || "", blockIdx: phaseIdx });
        if (cType) blocksByKey[blockKey].type = cType;
        // Distance + extras are encoded only on the first phase row of each block.
        if (cDistance && !blocksByKey[blockKey].distance) blocksByKey[blockKey].distance = cDistance;
        if (cDistanceUnit && !blocksByKey[blockKey].distanceUnit) blocksByKey[blockKey].distanceUnit = cDistanceUnit;
        if (extrasParsed && !blocksByKey[blockKey].extras) blocksByKey[blockKey].extras = extrasParsed;
      } else {
        // steady
        const cardios = map[key].cardios;
        while (cardios.length <= sessIdx) cardios.push(blank匀速有氧());
        const sc = {
          mode: "steady", type: cType || "", time: cMin || "", difficulty: cDiff || "",
          distance: cDistance || "", distanceUnit: cDistanceUnit || "",
        };
        if (extrasParsed) sc.extras = extrasParsed;
        cardios[sessIdx] = sc;
      }
    } else if (exercise) {
      let ex = map[key].exercises.find(e => e.name === exercise);
      if (!ex) { ex = { name: exercise, sets: [] }; map[key].exercises.push(ex); }
      if (weight || reps) ex.sets.push({ weight: weight || "", reps: reps || "" });
    }
  }
  // v0.16: blocksByKey is keyed by `${date}|${preset}|${sessIdx}` and each
  // value carries {sessIdx, type, phases, distance, distanceUnit}.
  // Reconstruct each interval block and slot it into the workout's array.
  for (const blockKey in blocksByKey) {
    const { sessIdx, type, phases, distance, distanceUnit, extras } = blocksByKey[blockKey];
    const sorted = phases.sort((a, b) => a.blockIdx - b.blockIdx);
    const rec = reconstruct间歇(sorted);
    const wsKey = blockKey.slice(0, blockKey.lastIndexOf("|"));
    if (!map[wsKey]) continue;
    const cardios = map[wsKey].cardios;
    while (cardios.length <= sessIdx) cardios.push(blank匀速有氧());
    const block = {
      ...blank间歇有氧(), type, ...rec,
      distance: distance || "", distanceUnit: distanceUnit || "",
    };
    if (extras) block.extras = extras;
    cardios[sessIdx] = block;
  }
  // Drop any trailing all-empty cardio slots that came from sparse session
  // indices (e.g. a CSV with only sessIdx=2 used).
  for (const w of Object.values(map)) {
    while (w.cardios.length && !cardioHasData(w.cardios[w.cardios.length - 1])) {
      w.cardios.pop();
    }
  }
  const workouts = Object.values(map).sort((a, b) => a.date.localeCompare(b.date));
  return { workouts, body, presetDefs, altDefs, settingsDefs };
}

function downloadCSV() {
  const h = ld();
  if (!h.length && !ldBody().length) return;
  const blob = new Blob([toCSV(h)], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `flatgym_backup_${tod().replace(/-/g, "_")}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  markBackupDone();
  toast("CSV 已下载");
}

// Build a CSV File and hand it to the OS share sheet. On Android the user
// can route the file straight to Drive (or any installed app); on iOS to
// Files / iCloud Drive / Mail. We get no callback, so we trust the user
// initiated a backup and record lastBackup. If the share API isn't available
// we fall back to download. Zero permissions, zero OAuth — the OS handles
// every credential and folder pick in its own UI.
function canShareCSV() {
  if (!navigator.canShare) return false;
  try {
    const probe = new File(["x"], "probe.csv", { type: "text/csv" });
    return navigator.canShare({ files: [probe] });
  } catch { return false; }
}
async function shareCSV() {
  const h = ld();
  if (!h.length && !ldBody().length) return;
  const file = new File([toCSV(h)], `flatgym_backup_${tod().replace(/-/g, "_")}.csv`, { type: "text/csv" });
  if (!canShareCSV()) { downloadCSV(); return; }
  try {
    await navigator.share({ files: [file], title: "Flatgym backup" });
    markBackupDone();
  } catch (e) {
    if (e && e.name === "AbortError") return;   // user dismissed share sheet — no toast
    toast("分享失败");
  }
}

function importCSV() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".csv";
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const { workouts, body, presetDefs, altDefs, settingsDefs } = fromCSV(r.result);
        const existing = ld();
        const keys = new Set(existing.map(w => `${w.date}|${w.preset}`));
        let addedW = 0;
        for (const w of workouts) {
          if (!keys.has(`${w.date}|${w.preset}`)) { existing.push(w); addedW++; }
        }
        existing.sort((a, b) => a.date.localeCompare(b.date));
        sv(existing);
        // Body rows: de-dupe by (date|name|value|unit) against existing entries.
        let addedB = 0;
        if (body.length) {
          const existingBody = ldBody();
          const seen = new Set(existingBody.map(e => `${e.date}|${e.name}|${e.value}|${e.unit || ""}`));
          for (const e of body) {
            const k = `${e.date}|${e.name}|${e.value}|${e.unit || ""}`;
            if (seen.has(k)) continue;
            seen.add(k);
            existingBody.push({ id: mkBodyId(), date: e.date, name: e.name, value: e.value, unit: e.unit });
            addedB++;
          }
          if (addedB) svBody(existingBody);
        }
        // v0.16: presets / alts / settings — overwrite per-key with imported
        // values so a fresh device picks up your customisations. Untouched
        // keys (those not in the import) keep their existing/default state.
        let addedP = 0;
        if (presetDefs && Object.keys(presetDefs).length) {
          for (const [k, def] of Object.entries(presetDefs)) {
            if (!P[k]) addedP++;
            P[k] = { ...P[k], ...def };
          }
          svPresets();
        }
        if (altDefs && Object.keys(altDefs).length) {
          const cur = ldAlts();
          for (const [orig, list] of Object.entries(altDefs)) {
            cur[orig] = Array.isArray(list) ? list : [];
          }
          svAlts(cur);
        }
        if (settingsDefs && Object.keys(settingsDefs).length) {
          if (typeof settingsDefs.units === "string") sv单位(settingsDefs.units);
          if (settingsDefs.rest && typeof settingsDefs.rest === "object") svRest(settingsDefs.rest);
          if (settingsDefs.backup && typeof settingsDefs.backup === "object") svBackup(settingsDefs.backup);
          // v0.18c: cardio fields registry (built-in enabled list + custom fields).
          if (settingsDefs.cardioFields && typeof settingsDefs.cardioFields === "object") {
            sv有氧Fields(settingsDefs.cardioFields);
          }
        }
        // Importing a CSV is itself proof-of-backup — reset the reminder.
        markBackupDone();
        const wPart = `${addedW} workout${addedW !== 1 ? "s" : ""}`;
        const bPart = addedB ? ` and ${addedB} measurement${addedB !== 1 ? "s" : ""}` : "";
        const pPart = addedP ? ` and ${addedP} preset${addedP !== 1 ? "s" : ""}` : "";
        toast(`Imported ${wPart}${bPart}${pPart}`);
        render();
      } catch (err) { toast("CSV 导入失败"); console.error(err); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function toast(msg) {
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg;
  document.body.appendChild(d);

}

// ── Month calendar (v0.11) ──
// Mon-first columns (NZ / ISO convention). Today is framed in the accent
// colour. Workout dates show the preset emoji instead of the day number; on
// days with multiple workouts the first emoji is dimmed and a +N badge
// shows the count of additional workouts. Prev/next chevrons navigate the
// month via S.statsMonthOffset (0 = current).
function renderMonthCalendar(history) {
  const offset = S.statsMonthOffset || 0;
  const today = new Date(tod() + "T00:00:00");
  const target = new Date(today.getFullYear(), today.getMonth() + offset, 1);
  const tYear = target.getFullYear();
  const tMonth = target.getMonth();
  const monthName = target.toLocaleString("en", { month: "long", year: "numeric" });

  // Mon-first index: 0=Mon..6=Sun. JS getDay() is 0=Sun..6=Sat.
  const offsetCells = (target.getDay() + 6) % 7;
  const daysInMonth = new Date(tYear, tMonth + 1, 0).getDate();

  const monthPrefix = `${tYear}-${String(tMonth + 1).padStart(2, "0")}-`;
  const byDate = {};
  for (const w of history) {
    if (!w.date.startsWith(monthPrefix)) continue;
    if (!byDate[w.date]) byDate[w.date] = [];
    byDate[w.date].push(w);
  }

  const todayStr = tod();
  const dows = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const dowHTML = dows.map(d => `<div class="cal-dow">${d}</div>`).join("");

  const cells = [];
  for (let i = 0; i < offsetCells; i++) cells.push(`<div class="cal-cell cal-empty"></div>`);
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = monthPrefix + String(day).padStart(2, "0");
    const ws = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    let inner;
    if (ws.length === 0) {
      inner = `<span class="cal-num">${day}</span>`;
    } else {
      const emoji = P[ws[0].preset]?.emoji || "💪";
      const greyed = ws.length > 1 ? " multi" : "";
      const extra = ws.length > 1 ? `<span class="cal-extra">+${ws.length - 1}</span>` : "";
      inner = `<span class="cal-emoji${greyed}">${escHTML(emoji)}</span>${extra}`;
    }
    cells.push(`<div class="cal-cell${isToday ? " today" : ""}" data-testid="cal-${dateStr}">${inner}</div>`);
  }
  while (cells.length % 7 !== 0) cells.push(`<div class="cal-cell cal-empty"></div>`);

  return `<div class="cal-block" data-testid="stats-calendar">
    <div class="cal-head">
      <button class="cal-nav" data-testid="cal-prev" aria-label="Previous month" onclick="statsPrevMonth()">‹</button>
      <div class="cal-title" data-testid="cal-title">${escHTML(monthName)}</div>
      <button class="cal-nav" data-testid="cal-next" aria-label="Next month" onclick="statsNextMonth()">›</button>
    </div>
    <div class="cal-grid">${dowHTML}${cells.join("")}</div>
  </div>`;
}

// ── Render ──
function renderTabs() {
  const logActive = S.view === "home" || S.view === "workout";
  const histActive = S.view === "history";
  const statsActive = S.view === "stats";
  const bodyActive = S.view === "body";
  tabsRoot.innerHTML = `
    <button class="tab${logActive ? ' active' : ''}" data-testid="tab-log" role="tab" aria-selected="${logActive}" onclick="goTab('log')">
      <span class="temo">🏋️</span><span>记录</span>
    </button>
    <button class="tab${histActive ? ' active' : ''}" data-testid="tab-history" role="tab" aria-selected="${histActive}" onclick="goTab('history')">
      <span class="temo">📋</span><span>历史</span>
    </button>
    <button class="tab${statsActive ? ' active' : ''}" data-testid="tab-stats" role="tab" aria-selected="${statsActive}" onclick="goTab('stats')">
      <span class="temo">📊</span><span>统计</span>
    </button>
    <button class="tab${bodyActive ? ' active' : ''}" data-testid="tab-body" role="tab" aria-selected="${bodyActive}" onclick="goTab('body')">
      <span class="temo">📏</span><span>身体</span>
    </button>
  `;
}

function goTab(tab) {
  if (tab === "log") {
    if (S.view !== "home" && S.view !== "workout") {
      S.view = S.preset ? "workout" : "home";
    }
  } else {
    S.view = tab;
    S.modal = null;
  }
  render();
}

function render() {
  // If an external action (tab switch, modal open, etc.) re-renders while the
  // autocomplete is open, tear it down without committing — matches user expectation
  // that navigating away cancels the in-flight rename/add.
  if (AC.open) acFinish(false);
  renderTabs();
  const h = ld();
  if (S.view === "home") renderHome(h);
  else if (S.view === "history") renderHistory(h);
  else if (S.view === "stats") renderStats(h);
  else if (S.view === "body") renderBody(h);
  else if (S.view === "preset-edit" && S.preset编辑Buf) renderPreset编辑or();
  else if ((S.view === "workout" || S.view === "edit") && S.preset) renderWorkout(h);
  renderModal();
}

    </div>
    ${render有氧Stats(h)}
  `;
}

// v0.18: cardio panel appended to Stats view. Renders only when there's
// actual cardio history. Three trend charts (duration, distance, pace),
// totals, and PRs.
function render有氧Stats(h) {
  const machines = cardioMachines(h);
  if (!machines.length) return "";

  const allMachines = ["All", ...machines];
  const selected = allMachines.includes(S.cardioMachine) ? S.cardioMachine : "All";
  S.cardioMachine = selected;

  // Per-session points (one dot per cardio session) — keeps "9 sessions"
  // visually obvious as 9 dots on the chart instead of week-binned to 3.
  const series = cardioSessionSeries(h, selected);
  const totals = cardioTotals(h, selected);
  const prs = cardioPRs(h, selected);
  const imp = isImperial();
  const distUnit = imp ? "mi" : "km";
  const distConv = imp ? (v => v / 1.60934) : null;

  const machineOpts = allMachines.map(m =>
    `<option value="${escHTML(m)}" ${m === selected ? "selected" : ""}>${escHTML(m)}</option>`
  ).join("");

  // Three mini-charts. Reuse renderChart with date+topWeight points so the
  // existing geometry / styling carries over.
  const minutesPoints = series.map(s => ({ date: s.date, topWeight: Math.round(s.minutes), volume: 0 }));
  const minutesChart = minutesPoints.length >= 1
    ? renderChart(minutesPoints, "weight")
    : `<div class="empty">No cardio yet for ${escHTML(selected)}.</div>`;

  const distPoints = series.filter(s => s.distanceKm > 0).map(s => ({ date: s.date, topWeight: s.distanceKm, volume: 0 }));
  const distChart = distPoints.length >= 1
    ? renderChart(distPoints, "weight", { convert: distConv })
    : "";

  // Pace only meaningful within a single machine — running pace and cycling
  // pace shouldn't share an axis. Shown when a single machine is selected
  // AND at least one session has both minutes and distance logged.
  const pacePoints = (selected !== "All")
    ? series.filter(s => s.minutes > 0 && s.distanceKm > 0).map(s => ({
        date: s.date,
        topWeight: imp ? (s.minutes / (s.distanceKm / 1.60934)) : (s.minutes / s.distanceKm),
        volume: 0,
      }))
    : [];
  const paceChart = pacePoints.length >= 1 ? renderChart(pacePoints, "weight") : "";

  // Totals card: 7d / 30d / all-time.
  const fmtDist = (km) => {
    if (km <= 0) return "—";
    const v = imp ? km / 1.60934 : km;
    return `${v.toFixed(1)} ${distUnit}`;
  };
  const fmtMins = (m) => {
    if (m <= 0) return "—";
    const txt = fmtDuration(Math.round(m * 60));   // fmtDuration takes seconds
    return txt || `${Math.round(m)} min`;
  };
  const totalsRows = [["d7", "Last 7 days"], ["d30", "Last 30 days"], ["all", "全部"]].map(([k, lbl]) => {
    const t = totals[k];
    return `<div class="stats-row"><span class="stats-k">${lbl}</span><span class="stats-v">${t.s} session${t.s === 1 ? "" : "s"} · ${fmtMins(t.m)}${t.k > 0 ? " · " + fmtDist(t.k) : ""}</span></div>`;
  }).join("");

  // PRs.
  const prRows = [];
  if (prs.longestDur) {
    prRows.push(`<div class="stats-row"><span class="stats-k">Longest session</span><span class="stats-v">${fmtMins(prs.longestDur.minutes)} (${escHTML(prs.longestDur.date)}${prs.longestDur.type ? " · " + escHTML(prs.longestDur.type) : ""})</span></div>`);
  }
  if (prs.longestDist) {
    prRows.push(`<div class="stats-row"><span class="stats-k">Longest distance</span><span class="stats-v">${fmtDist(prs.longestDist.km)} (${escHTML(prs.longestDist.date)}${prs.longestDist.type ? " · " + escHTML(prs.longestDist.type) : ""})</span></div>`);
  }
  if (prs.bestPace) {
    const pp = imp ? prs.bestPace.paceMinPerKm * 1.60934 : prs.bestPace.paceMinPerKm;
    const min = Math.floor(pp), sec = Math.round((pp - min) * 60);
    prRows.push(`<div class="stats-row"><span class="stats-k">Fastest pace</span><span class="stats-v">${min}:${String(sec).padStart(2, "0")} /${distUnit} (${escHTML(prs.bestPace.date)})</span></div>`);
  }
  const prBlock = prRows.length
    ? `<div class="stats-block"><div class="stats-title">PRs</div>${prRows.join("")}</div>`
    : "";

  const distBlock = distChart
    ? `<div class="cardio-chart-h">Distance (${distUnit})</div>${distChart}`
    : "";
  const paceBlock = paceChart
    ? `<div class="cardio-chart-h">Pace (min/${distUnit})</div>${paceChart}`
    : (selected === "All" ? `<p class="empty stats-mini" style="margin:6px 0 0">Pick a single machine for pace stats.</p>` : "");

  return `
    <div class="stats-block" data-testid="cardio-stats">
      <div class="stats-title">🏃 有氧</div>
      <select class="sel" data-testid="cardio-machine-picker" style="width:100%;margin-bottom:10px" onchange="S.cardioMachine=this.value;render()">${machineOpts}</select>
      <div class="cardio-chart-h">Duration (min)</div>
      ${minutesChart}
      ${distBlock}
      ${paceBlock}
    </div>
    <div class="stats-block" data-testid="cardio-totals-block">
      <div class="stats-title">Totals · ${escHTML(selected)}</div>
      ${totalsRows}
    </div>
    ${prBlock}
  `;
}

function renderBody(h) {
  const groups = bodyGroups();
  let body = "";
  if (!groups.size) {
    body = `<p class="empty">No measurements yet. Tap <b>+ Log measurement</b> to start (体重 is a good first one).</p>`;
  } else {
    // Sort group names: most-recently-updated first.
    const names = [...groups.entries()]
      .sort((a, b) => b[1][b[1].length - 1].date.localeCompare(a[1][a[1].length - 1].date))
      .map(([n]) => n);
    for (const name of names) {
      const entries = groups.get(name);
      const latest = entries[entries.length - 1];
      const unit = latest.unit || "";
      const prev = entries.length >= 2 ? entries[entries.length - 2] : null;
      const delta = prev ? (parseFloat(latest.value) - parseFloat(prev.value)) : 0;
      const deltaHtml = prev && isFinite(delta) && delta !== 0
        ? `<span class="bm-delta ${delta > 0 ? 'up' : 'down'}">${delta > 0 ? '▲' : '▼'} ${fmtW(Math.round(delta * 100) / 100)} ${escHTML(unit)}</span>`
        : "";
      const points = entries.map(e => ({ date: e.date, topWeight: parseFloat(e.value) || 0, topReps: 0, volume: 0 }));
      const chart = entries.length >= 2 ? renderChart(points, "weight") : "";
      let rows = "";
      for (let i = entries.length - 1; i >= 0; i--) {
        const e = entries[i];
        rows += `<div class="bm-row" data-testid="bm-row-${escHTML(e.id)}">
          <span class="bm-date">${escHTML(e.date)}</span>
          <span class="bm-val">${escHTML(fmtW(e.value))} ${escHTML(e.unit || "")}</span>
          <button class="xbtn" title="删除 entry" onclick="deleteBodyEntry('${escHTML(e.id)}')">✕</button>
        </div>`;
      }
      body += `<div class="bm-card" data-testid="bm-card-${escHTML(name)}">
        <div class="bm-head">
          <div>
            <div class="bm-name">${escHTML(name)}</div>
            <div class="bm-meta"><span class="bm-latest">${escHTML(fmtW(latest.value))} ${escHTML(unit)}</span> · ${escHTML(latest.date)} ${deltaHtml}</div>
          </div>
          <button class="nbtn" style="width:auto;margin:0;padding:8px 12px" data-testid="bm-log-${escHTML(name)}" onclick="openBodyLogForName(this, ${escHTML(JSON.stringify(name))})">+ Log</button>
        </div>
        ${chart}
        <details class="bm-details"><summary>All entries (${entries.length})</summary>${rows}</details>
      </div>`;
    }
  }
  app.innerHTML = `
    <h2 class="htit">📏 身体</h2>
    <button class="nbtn" data-testid="bm-add" onclick="openBodyLog(this)">+ Log measurement</button>
    ${body}
  `;
}

function renderWorkout(h) {
  const p = P[S.preset];
  const editing = S.view === "edit";
  const allShifts = editing ? [] : ldShifts();
  let cards = "";

  const wUnit = weightUnit();
  for (let ei = 0; ei < S.exercises.length; ei++) {
    const ex = S.exercises[ei];
    const last = findLast(h, ex.name);
    const exId = exerciseIdForName(ex.name);
    const infoBtn = exId
      ? `<button class="ex-info" data-testid="ex-info-${ei}" title="动作详情" aria-label="动作详情" onclick="openExerciseInfo(${escHTML(JSON.stringify(exId))}, ${escHTML(JSON.stringify(ex.name))})">?</button>`
      : "";
    let setsHTML = "";
    for (let si = 0; si < ex.sets.length; si++) {
      const s = ex.sets[si];
      const neg = String(s.weight).trim().startsWith("-");
      setsHTML += `<div class="sr">
        <span class="sn">S${si+1}</span>
        <input class="ni" type="number" inputmode="decimal" placeholder="${wUnit}" value="${escHTML(kgToDisplay(s.weight))}" onchange="upSet(${ei},${si},'weight',this.value)">
        <button class="sgn${neg ? ' on' : ''}" title="Toggle negative (for assisted lifts)" aria-label="Toggle negative weight" onclick="negSet(${ei},${si})">±</button>
        <span class="mul">×</span>
        <input class="ni" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" onchange="upSet(${ei},${si},'reps',this.value)">
        <button class="xbtn" onclick="rmSet(${ei},${si})">✕</button>
      </div>`;
    }

    const altAnnot = (ex.alternativeOf && !editing)
      ? `<div class="sh-annot">🔄 alternative for ${escHTML(ex.alternativeOf)}</div>`
      : "";
    if (ex.shiftId) {
      // shifted-in exercise — badge, no shift button
      const fromLabel = P[ex.fromPreset]?.label || ex.fromPreset;
      cards += `<div class="card card-sh" data-testid="shifted-in">
        <div class="chead">
          <div>
            <div class="ctit">${escHTML(ex.name)} ${infoBtn}</div>
            <div class="sh-badge">⏭ from ${escHTML(fromLabel)}</div>
          </div>
          ${editing ? "" : `<button class="alt-ex" data-testid="alt-${ei}" title="选择或添加替代动作" aria-label="替代动作" onclick="openAltPicker(${ei})">🔄</button>`}
        </div>
        ${altAnnot}
        ${ltHTML(last, "exercise")}
        ${setsHTML}
        <button class="abtn" onclick="addSet(${ei})">+ 添加组</button>
      </div>`;
    } else {
      // native exercise of this preset
      const pending = editing ? null : allShifts.find(sh => sh.exercise === ex.name && sh.fromPreset === S.preset);
      const shiftAnnot = pending ? `<div class="sh-annot">⏭ shifted to ${shiftTargetLabel(pending.toPreset)}</div>` : "";
      // Alt-suggest chip — when this exercise has remembered alternatives,
      // surface the most-recent one as a one-tap inline link so the user
      // doesn't have to open the picker modal.
      const remembered = editing ? [] : getAltsFor(ex.name);
      const altSuggest = remembered.length
        ? `<button class="alt-suggest" data-testid="alt-suggest-${ei}" onclick="quickPickAlt(${ei}, ${escHTML(JSON.stringify(remembered[0]))})" title="Tap to swap to ${escHTML(remembered[0])}">🔄 ${escHTML(remembered[0])}${remembered.length > 1 ? ` <span class="muted">+${remembered.length - 1} more</span>` : ""}</button>`
        : "";
      const rightBtns = editing
        ? `<button class="shift-ex" title="Remove exercise from this workout" onclick="rm编辑Exercise(${ei})">✕ Remove</button>`
        : `<button class="shift-ex" data-testid="shift-${ei}" title="Shift to another day" aria-label="Shift" onclick="openShiftPicker(${ei})">⏭</button>
           <button class="alt-ex" data-testid="alt-${ei}" title="选择或添加替代动作" aria-label="替代动作" onclick="openAltPicker(${ei})">🔄</button>`;
      cards += `<div class="card">
        <div class="chead">
          <div class="ctit">${escHTML(ex.name)} ${infoBtn}</div>
          <div class="chead-btns">${rightBtns}</div>
        </div>
        ${shiftAnnot}
        ${altAnnot}
        ${altSuggest}
        ${ltHTML(last, "exercise")}
        ${setsHTML}
        <button class="abtn" onclick="addSet(${ei})">+ 添加组</button>
      </div>`;
    }
  }

  // v0.18: Add an ad-hoc exercise to *just this session* (preset's default
  // exercise list is unchanged). Same handler as the edit-view + button —
  // it only differs in autosaving the draft for live workouts.
  if (!editing) {
    cards += `<button class="abtn" data-testid="workout-add-exercise" onclick="addExerciseToWorkout(this)">+ 添加动作（仅本次训练）</button>`;
  }

  // 有氧 — gated by the preset's `cardio` flag (default true). If the flag
  // is off but the workout already has cardio data (e.g. imported, or edited
  // after the preset was toggled), still render so the data isn't lost
  // silently when the user re-saves.
  const presetWants有氧 = (P[S.preset]?.cardio !== false);
  const show有氧 = presetWants有氧 || (S.cardios || []).some(cardioHasData);
  if (show有氧) {
    const lc = findLast有氧(h, S.preset);
    for (let bi = 0; bi < S.cardios.length; bi++) {
      const cd = S.cardios[bi];
      let opts = '<option value="">—</option>';
      for (const c of CARDIO) opts += `<option value="${c}" ${cd.type === c ? "selected" : ""}>${c}</option>`;

      const modeToggle = `
        <div class="mode-toggle" data-testid="cardio-mode-${bi}">
          <button class="mode-btn ${cd.mode !== 'interval' ? 'active' : ''}" onclick="set有氧Mode(${bi}, 'steady')">匀速</button>
          <button class="mode-btn ${cd.mode === 'interval' ? 'active' : ''}" onclick="set有氧Mode(${bi}, 'interval')">间歇</button>
        </div>`;

      let cardioBody;
      if (cd.mode === 'interval') {
        const wu = cd.warmup || {};
        const rd = cd.rounds || {};
        const rw = rd.work || {};
        const rr = rd.rest || {};
        const cl = cd.cooldown || {};
        cardioBody = `
          <div class="fg" style="margin-bottom:10px">
            <label class="fl">Machine</label>
            <select class="sel" onchange="set有氧Type(${bi}, this.value)">${opts}</select>
          </div>
          <div class="cardio-presets">
            <button class="preset-btn" data-testid="preset-hiit-${bi}" onclick="apply有氧Preset(${bi}, 'hiit')">HIIT</button>
            <button class="preset-btn" data-testid="preset-tabata-${bi}" onclick="apply有氧Preset(${bi}, 'tabata')">Tabata</button>
            <button class="preset-btn" onclick="apply有氧Preset(${bi}, 'clear')">Clear</button>
          </div>
          <div class="phase-label">Warm-up</div>
          <div class="cgrid2">
            <input class="ni" data-testid="cardio-warmup-min-${bi}" type="number" step="0.01" inputmode="decimal" placeholder="min" value="${wu.minutes || ''}" onchange="up有氧Field(${bi}, 'warmup','minutes',this.value)">
            <input class="ni" data-testid="cardio-warmup-lvl-${bi}" type="number" inputmode="numeric" placeholder="lvl" value="${wu.level || ''}" onchange="up有氧Field(${bi}, 'warmup','level',this.value)">
          </div>
          <div class="phase-label">Rounds <input class="ni" data-testid="cardio-rounds-count-${bi}" type="number" inputmode="numeric" placeholder="N" value="${rd.count || ''}" onchange="upRoundsCount(${bi}, this.value)" style="width:70px;margin-left:6px"></div>
          <div class="phase-label sub">Work</div>
          <div class="cgrid2">
            <input class="ni" data-testid="cardio-work-min-${bi}" type="number" step="0.01" inputmode="decimal" placeholder="min" value="${rw.minutes || ''}" onchange="up有氧Field(${bi}, 'rounds.work','minutes',this.value)">
            <input class="ni" data-testid="cardio-work-lvl-${bi}" type="number" inputmode="numeric" placeholder="lvl" value="${rw.level || ''}" onchange="up有氧Field(${bi}, 'rounds.work','level',this.value)">
          </div>
          <div class="phase-label sub">Rest</div>
          <div class="cgrid2">
            <input class="ni" data-testid="cardio-rest-min-${bi}" type="number" step="0.01" inputmode="decimal" placeholder="min" value="${rr.minutes || ''}" onchange="up有氧Field(${bi}, 'rounds.rest','minutes',this.value)">
            <input class="ni" data-testid="cardio-rest-lvl-${bi}" type="number" inputmode="numeric" placeholder="lvl" value="${rr.level || ''}" onchange="up有氧Field(${bi}, 'rounds.rest','level',this.value)">
          </div>
          <div class="phase-label">Cool-down</div>
          <div class="cgrid2">
            <input class="ni" data-testid="cardio-cooldown-min-${bi}" type="number" step="0.01" inputmode="decimal" placeholder="min" value="${cl.minutes || ''}" onchange="up有氧Field(${bi}, 'cooldown','minutes',this.value)">
            <input class="ni" data-testid="cardio-cooldown-lvl-${bi}" type="number" inputmode="numeric" placeholder="lvl" value="${cl.level || ''}" onchange="up有氧Field(${bi}, 'cooldown','level',this.value)">
          </div>
          <div class="phase-label">Total distance <span class="muted">(${cd.distanceUnit || defaultDistanceUnit()}, optional)</span></div>
          <div class="cgrid2">
            <input class="ni" data-testid="cardio-distance-${bi}" type="number" inputmode="decimal" step="0.01" placeholder="${cd.distanceUnit || defaultDistanceUnit()}" value="${cd.distance || ''}" onchange="up有氧Distance(${bi}, this.value)">
            <div class="cardio-pace" data-testid="cardio-pace-${bi}">${(() => { const u = cd.distanceUnit || defaultDistanceUnit(); const minsTotal = (parseFloat((cd.warmup||{}).minutes) || 0) + (parseFloat((cd.cooldown||{}).minutes) || 0) + ((parseInt((cd.rounds||{}).count) || 0) * ((parseFloat(((cd.rounds||{}).work||{}).minutes) || 0) + (parseFloat(((cd.rounds||{}).rest||{}).minutes) || 0))); const p = fmtPace(minsTotal, cd.distance, u); return p ? escHTML(p) : '<span class="muted">— pace shown when distance set</span>'; })()}</div>
          </div>
        `;
      } else {
        const distUnit = cd.distanceUnit || defaultDistanceUnit();
        const paceTxt = fmtPace(cd.time, cd.distance, distUnit);
        cardioBody = `
          <div class="cgrid">
            <div class="fg">
              <label class="fl">Machine</label>
              <select class="sel" onchange="set有氧Type(${bi}, this.value)">${opts}</select>
            </div>
            <div class="fg">
              <label class="fl">Minutes</label>
              <input class="ni" type="number" inputmode="decimal" step="0.1" placeholder="min" value="${cd.time || ''}" onchange="up有氧匀速Field(${bi}, 'time', this.value)" style="width:100%">
            </div>
            <div class="fg">
              <label class="fl">Level</label>
              <input class="ni" type="number" inputmode="numeric" placeholder="1-20" value="${cd.difficulty || ''}" min="1" max="30" onchange="up有氧匀速Field(${bi}, 'difficulty', this.value)" style="width:100%">
            </div>
          </div>
          <div class="cgrid2" style="margin-top:10px">
            <div class="fg">
              <label class="fl">Distance <span class="muted">(${distUnit})</span></label>
              <input class="ni" data-testid="cardio-distance-${bi}" type="number" inputmode="decimal" step="0.01" placeholder="${distUnit}" value="${cd.distance || ''}" onchange="up有氧Distance(${bi}, this.value)" style="width:100%">
            </div>
            <div class="fg">
              <label class="fl">Pace</label>
              <div class="cardio-pace" data-testid="cardio-pace-${bi}">${paceTxt ? escHTML(paceTxt) : '<span class="muted">— enter min + distance</span>'}</div>
            </div>
          </div>`;
      }

      // First block uses the friendly "🏃 有氧" heading; later blocks are
      // numbered "🏃 有氧 #2" etc. The Remove button only shows from the
      // second block onward — the first one is implicit (use + Add to grow,
      // tap Remove to shrink back). Keeps the UI uncluttered for the common
      // case (one block per workout).
      const heading = bi === 0 ? "🏃 有氧" : `🏃 有氧 #${bi + 1}`;
      const removeBtn = !editing
        ? `<button class="cardio-rm" data-testid="cardio-rm-${bi}" title="Remove this cardio block" onclick="rm有氧Block(${bi})">× Remove</button>`
        : "";
      // v0.17: on the first cardio block, render the last-time chip with a
      // ↻ Use last time button that copies the previous session's cardio
      // straight into this block (machine, mode, fields, distance). Only
      // offered when the current block hasn't been touched yet.
      let lastChip = "";
      if (bi === 0 && lc) {
        const empty = !cardioHasData(cd);
        const useBtn = empty
          ? `<button class="cardio-use-last" data-testid="cardio-use-last" onclick="useLast有氧(${bi})" title="复制上次的有氧">↻ Use last time</button>`
          : "";
        lastChip = `<div class="lt-row">${ltHTML(lc, "cardio")}${useBtn}</div>`;
      }
      // v0.18c: optional extras (HR, power, RPE, calories, …) the user
      // turned on in 设置 → 🏃 有氧 fields. Tucked into a collapsible
      // "More fields ▾" so the basic block stays minimal by default.
      const extras = cd.extras || {};
      const enabledFields = enabled有氧Fields();
      const extrasInputs = enabledFields.map(f => {
        const inputType = f.type === "text" ? "text" : "number";
        const inputMode = f.type === "text" ? "text" : "decimal";
        const minAttr = (typeof f.min === "number") ? ` min="${f.min}"` : "";
        const maxAttr = (typeof f.max === "number") ? ` max="${f.max}"` : "";
        const unitLbl = f.unit ? ` <span class="muted">(${escHTML(f.unit)})</span>` : "";
        return `<div class="fg">
          <label class="fl">${escHTML(f.label)}${unitLbl}</label>
          <input class="ni" type="${inputType}" inputmode="${inputMode}" step="0.1"${minAttr}${maxAttr} placeholder="${escHTML(f.unit || "")}" value="${escHTML(extras[f.key] || "")}" data-testid="cardio-extra-${escHTML(f.key)}-${bi}" onchange="up有氧Extra(${bi}, ${escHTML(JSON.stringify(f.key))}, this.value)" style="width:100%">
        </div>`;
      }).join("");
      // Auto-open if the user has already filled extras for this block;
      // otherwise stay collapsed so the basic UI is uncluttered.
      const hasFilledExtra = enabledFields.some(f => (extras[f.key] || "").toString().trim() !== "");
      const extrasBlock = enabledFields.length
        ? `<details class="cardio-extras" data-testid="cardio-extras-${bi}"${hasFilledExtra ? " open" : ""}>
             <summary>More fields <span class="muted">(${enabledFields.length})</span></summary>
             <div class="cardio-extras-grid">${extrasInputs}</div>
           </details>`
        : "";
      cards += `<div class="card card-c" data-testid="cardio-card-${bi}">
        <div class="chead">
          <h3 class="ctit">${heading}</h3>
          ${removeBtn}
        </div>
        ${lastChip}
        ${modeToggle}
        ${cardioBody}
        ${extrasBlock}
      </div>`;
    }
    if (!editing) {
      cards += `<button class="abtn" data-testid="cardio-add" onclick="add有氧Block()">+ 添加有氧区块</button>`;
    }
  }   // end of show有氧 gate

  // Workout notes — free-text field at the bottom of the card stack. The
  // textarea uses oninput so the autosave draft picks up partial writes.
  const notesChange = editing ? "S.notes=this.value" : "S.notes=this.value;touch()";
  cards += `<div class="card card-notes">
    <label class="fl">📝 备注</label>
    <textarea class="ni notes-ta" data-testid="workout-notes" rows="2" placeholder="Optional — anything worth remembering about this session" oninput="${notesChange}">${escHTML(S.notes || "")}</textarea>
  </div>`;

  let footer;
  if (editing) {
    let presetOpts = "";
    for (const [k, pp] of Object.entries(P)) {
      presetOpts += `<option value="${escHTML(k)}" ${k === S.preset ? "selected" : ""}>${escHTML(pp.emoji)} ${escHTML(pp.label)}</option>`;
    }
    footer = `

      </div>
      <div class="edit-actions">
        <button class="bbtn" data-testid="edit-cancel" onclick="cancel编辑()">取消</button>
        <button class="svbtn" data-testid="edit-save" style="background:var(--ac);flex:1" onclick="save编辑()">💾 保存 changes</button>
      </div>
    `;
  } else {
    footer = `<button class="svbtn" style="background:${S.saved ? 'var(--gn)' : 'var(--ac)'}" onclick="saveWorkout()">
      ${S.saved ? "✓ 已保存" : "保存训练"}
    </button>`;
  }

  const headerLeft = editing
    ? `<button class="bbtn" onclick="cancel编辑()">✕ 取消</button>`
    : `<button class="bbtn" onclick="backHome()">← Back</button>`;
  const dateChangeHandler = editing ? "S.date=this.value;render()" : "S.date=this.value;touch()";
  const title = editing
    ? `<h2 class="wtit">✏️ 编辑 · ${escHTML(S.date)}</h2>`
    : `<h2 class="wtit">${escHTML(p.emoji)} ${escHTML(p.label)}</h2>`;

  app.innerHTML = `
    <div class="whdr">
      ${headerLeft}
      <input class="din" type="date" value="${S.date}" onchange="${dateChangeHandler}">
    </div>
    ${title}
    ${cards}
    ${footer}
  `;
}

function renderPreset编辑or() {
  const buf = S.preset编辑Buf;
  const isNew = S.preset编辑ingKey === "__new__";
  let rows = "";
  if (!buf.ex.length) {
    rows = `<p class="empty" style="margin:14px 0">No exercises yet — add one below.</p>`;
  } else {
    for (let i = 0; i < buf.ex.length; i++) {
      const name = buf.ex[i];
      const upDisabled = i === 0 ? "disabled" : "";
      const dnDisabled = i === buf.ex.length - 1 ? "disabled" : "";
      rows += `<div class="pe-row" data-testid="pe-row-${i}">
        <button class="pe-name" onclick="renamePresetExercise(${i}, this)" title="Tap to rename">${escHTML(name)}</button>
        <button class="pe-btn" ${upDisabled} onclick="movePresetExercise(${i}, -1)" title="Move up">▲</button>
        <button class="pe-btn" ${dnDisabled} onclick="movePresetExercise(${i}, 1)" title="Move down">▼</button>
        <button class="pe-btn pe-rm" onclick="rmPresetExercise(${i})" title="Remove">✕</button>
      </div>`;
    }
  }
  const deleteBtn = (!isNew && Object.keys(P).length > 1)
    ? `<button class="rbtn" data-testid="preset-delete" onclick="deletePreset()">删除 preset</button>`
    : "";
  app.innerHTML = `
    <div class="whdr">
      <button class="bbtn" onclick="cancelPreset编辑()">✕ 取消</button>
      <h2 class="wtit" style="margin:0">${isNew ? "新建预设" : "编辑预设"}</h2>
    </div>
    <div class="pe-head">
      <input class="ni pe-emoji" data-testid="pe-emoji" maxlength="4" value="${escHTML(buf.emoji)}" oninput="upPresetField('emoji', this.value)">
      <input class="ni pe-label" data-testid="pe-label" placeholder="Preset name" value="${escHTML(buf.label)}" oninput="upPresetField('label', this.value)">

    <label class="pe-cardio" data-testid="pe-cardio">
      <input type="checkbox" data-testid="pe-cardio-cb" ${buf.cardio !== false ? "checked" : ""} onchange="upPresetField('cardio', this.checked)">
      <span>🏃 Show cardio block on this preset's workout screen</span>

    <div class="edit-actions" style="margin-top:18px">

    </div>
    ${deleteBtn}

              <input class="ni" data-testid="body-value" type="number" step="0.01" inputmode="decimal" value="${escHTML(m.value || "")}" style="width:100%">
            </div>
            <div class="fg">
              <label class="fl">Unit</label>
              <input class="ni" data-testid="body-unit" autocomplete="off" placeholder="kg / cm / %" value="${escHTML(m.unit || "kg")}" style="width:100%">
            </div>
            <div class="fg">
              <label class="fl">Date</label>
              <input class="ni" data-testid="body-date" type="date" value="${escHTML(m.date || tod())}" style="width:100%">
            </div>
          </div>
          <div class="edit-actions" style="margin-top:14px">
            <button class="bbtn" onclick="closeBodyLog()">取消</button>
            <button class="svbtn" data-testid="body-save" style="background:var(--ac);flex:1" onclick="saveBodyLog()">💾 保存</button>
          </div>
        </div>
      </div>
    `;
  }
}

// ── Actions ──
function go(key) {
  clearDraft();
  S.preset = key;
  S.date = tod();
  S.saved = false;
  // Seed one empty cardio block when the preset has cardio enabled, none otherwise.
  S.cardios = (P[key]?.cardio !== false) ? [blank匀速有氧()] : [];
  S.notes = "";
  S.workoutStartedAt = null;
  S.modal = null;
  // default exercises for this preset
  S.exercises = P[key].ex.map(n => ({ name: n, sets: [] }));
  // append shifted-in exercises (specific target OR "any" from non-origin)
  for (const sh of ldShifts()) {
    const applies = sh.toPreset === "any" ? sh.fromPreset !== key : sh.toPreset === key;
    if (!applies) continue;
    if (S.exercises.some(e => e.name === sh.exercise)) continue;   // defensive
    S.exercises.push({ name: sh.exercise, sets: [], shiftId: sh.id, fromPreset: sh.fromPreset });
  }
  S.view = "workout";
  render();
}

// "现在做" button on home shift card — opens the target preset's workout.
function goShift(shiftId) {
  const sh = ldShifts().find(s => s.id === shiftId);
  if (!sh) return;
  if (sh.toPreset !== "any") { go(sh.toPreset); return; }
  // "any" shouldn't show a 现在做 button, but fall back to the first non-origin preset
  const k = Object.keys(P).find(x => x !== sh.fromPreset);
  if (k) go(k);
}

function addSet(ei) {
  const ex = S.exercises[ei];
  const h = ld();
  const last = findLast(h, ex.name);
  const prev = ex.sets.length > 0 ? ex.sets[ex.sets.length - 1] : (last?.sets?.[0] || { weight: "", reps: "" });
  ex.sets.push({ weight: prev.weight, reps: prev.reps });
  // Mark workout start on the very first add-set of this session, so the
  // duration captures the wall-clock time from "I started logging" to
  // "I tapped 保存". 跳过ped during edit mode.
  if (S.view !== "edit" && !S.workoutStartedAt) S.workoutStartedAt = Date.now();
  touch();
  render();
  // Workflow: user does the set, then taps + 添加组 on the phone to log
  // it. Adding the row is the post-set moment, so it's when the rest timer
  // should start — including for the very first set of an exercise.
  if (S.view !== "edit") startRestTimer();
}

function upSet(ei, si, field, val) {
  // Store canonical kg regardless of user's display mode.
  if (field === "weight") val = displayToKg(val);
  S.exercises[ei].sets[si][field] = val;
  touch();
}

function negSet(ei, si) {
  const s = S.exercises[ei].sets[si];
  const raw = String(s.weight).trim();
  if (raw === "" || raw === "0" || raw === "-0") { toast("请先输入重量"); return; }
  s.weight = raw.startsWith("-") ? raw.slice(1) : "-" + raw;
  touch();
  render();
}

function rmSet(ei, si) {
  S.exercises[ei].sets.splice(si, 1);
  touch();
  render();
}

function saveWorkout() {
  // Drop any cardio block the user added but never filled in.
  const cardios = (S.cardios || []).filter(cardioHasData);
  const hasData = S.exercises.some(e => e.sets?.length > 0) || cardios.length > 0;
  if (!hasData) { toast("Nothing to save"); return; }
  const duration = S.workoutStartedAt
    ? Math.max(0, Math.round((Date.now() - S.workoutStartedAt) / 1000))
    : 0;
  const h = ld();
  h.push({
    id: mkWorkoutId(), date: S.date, preset: S.preset,
    exercises: S.exercises, cardios,
    notes: (S.notes || "").trim(),
    duration,
  });
  sv(h);
  clearDraft();
  // Consume: any shift whose exercise was logged (anywhere) is done.
  const logged = new Set(S.exercises.filter(e => e.sets?.length > 0).map(e => e.name));
  if (logged.size) consumeShiftsFor(logged);
  // Expire: origin preset was re-done on a later date — "一轮后消失".
  expireShiftsFrom(S.preset, S.date);
  S.saved = true;
  render();
  toast("Workout saved");
}

// v0.16: cardio-block setters take a block index. Each block is an entry in
// S.cardios; mode/type/fields edit only that block. Out-of-range indices are
// silently ignored so a stale callback doesn't blow up after a Remove.
function ensure有氧(idx) {
  if (idx < 0 || idx >= S.cardios.length) return null;
  return S.cardios[idx];
}
function set有氧Mode(idx, mode) {
  const cd = ensure有氧(idx); if (!cd) return;
  if (mode === cd.mode) return;
  const t = cd.type || "";
  if (mode === "steady") {
    S.cardios[idx] = { ...blank匀速有氧(), type: t };
  } else {
    S.cardios[idx] = { ...blank间歇有氧(), type: t };
  }
  touch();
  render();
}

function apply有氧Preset(idx, key) {
  const cd = ensure有氧(idx); if (!cd) return;
  const p = CARDIO_PRESETS[key];
  if (!p) return;
  const t = cd.type || "";
  S.cardios[idx] = {
    mode: "interval", type: t,
    warmup: { ...p.warmup },
    rounds: { count: p.rounds.count, work: { ...p.rounds.work }, rest: { ...p.rounds.rest } },
    cooldown: { ...p.cooldown },
  };
  touch();
  render();
}

function set有氧Type(idx, value) {
  const cd = ensure有氧(idx); if (!cd) return;
  cd.type = value;
  touch();
}

function up有氧Field(idx, path, key, val) {
  const cd = ensure有氧(idx); if (!cd) return;
  const parts = path.split(".");
  let obj = cd;
  for (const p of parts) {
    if (!obj[p]) obj[p] = {};
    obj = obj[p];
  }
  obj[key] = val;
  touch();
}

function upRoundsCount(idx, val) {
  const cd = ensure有氧(idx); if (!cd) return;
  if (!cd.rounds) {
    cd.rounds = { count: val, work: { minutes: "", level: "" }, rest: { minutes: "", level: "" } };
  } else {
    cd.rounds.count = val;
  }
  touch();
}

function up有氧匀速Field(idx, field, val) {
  const cd = ensure有氧(idx); if (!cd) return;
  cd[field] = val;
  touch();
}

function up有氧Distance(idx, val) {
  const cd = ensure有氧(idx); if (!cd) return;
  cd.distance = val;
  if ((val || "").toString().trim() && !cd.distanceUnit) {
    cd.distanceUnit = defaultDistanceUnit();
  }
  touch();
  render();   // re-render so the pace line updates without a focus loss (input was already blurred).
}

// v0.18c: write/clear an extras value on a specific cardio block. Empty
// values delete the key so we don't accumulate "" entries on every blur.
function up有氧Extra(idx, key, val) {
  const cd = ensure有氧(idx); if (!cd) return;
  if (!cd.extras) cd.extras = {};
  const trimmed = (val || "").toString().trim();
  if (trimmed === "") delete cd.extras[key];
  else cd.extras[key] = trimmed;
  if (Object.keys(cd.extras).length === 0) delete cd.extras;
  touch();
}

function add有氧Block() {
  S.cardios.push(blank匀速有氧());
  touch();
  render();
}

// v0.17: copy the most recent cardio block from the same preset's history
// straight into the indexed block. Only intended for empty blocks; the
// caller (the ↻ Use last time button) only renders on empty blocks anyway.
function useLast有氧(idx) {
  const cd = ensure有氧(idx); if (!cd) return;
  const lc = findLast有氧(ld(), S.preset);
  if (!lc) { toast("No prior cardio in this preset yet"); return; }
  S.cardios[idx] = JSON.parse(JSON.stringify(lc.cardio));
  touch();
  render();
  toast("Filled from last time");
}

function rm有氧Block(idx) {
  if (idx < 0 || idx >= S.cardios.length) return;
  if (cardioHasData(S.cardios[idx]) && !confirm("移除此有氧区块？已填内容将丢失。")) return;
  S.cardios.splice(idx, 1);
  touch();
  render();
}

function backHome() {
