// ── Share workout (v0.9) ──
// Holds the rendered canvas + text + filename for the active share modal.
// Module-level (not on S) because Canvas elements aren't JSON-serialisable
// and would break the autosave draft if they ended up on S.
let SHARE_CTX = null;

// Compute the all-time top weight value per exercise across the entire
// history. Used to put 🏆 PR badges on sets in the shared workout that
// match (or tie) their lifetime max.
function computePRMap(history) {
  const map = {};
  for (const w of history) {
    for (const e of (w.exercises || [])) {
      for (const s of (e.sets || [])) {
        const wt = parseFloat(s.weight);
        if (!isFinite(wt)) continue;
        if (!(e.name in map) || wt > map[e.name]) map[e.name] = wt;
      }
    }
  }
  return map;
}

// For the workout being shared, pick at most ONE set per exercise to badge as
// a PR. Tiebreak among sets that tie the all-time max weight:
//   1. Most reps wins.
//   2. If reps are also tied, the LATEST set in the workout wins.
// Avoids visual clutter of multiple 🏆s in a row.
function computePRBadgeIndices(workout, prMap) {
  const out = {};
  for (const e of (workout.exercises || [])) {
    if (!e.sets?.length) continue;
    const target = prMap[e.name];
    if (target === undefined) continue;
    let bestIdx = -1, bestReps = -1;
    for (let i = 0; i < e.sets.length; i++) {
      const wt = parseFloat(e.sets[i].weight);
      if (!isFinite(wt) || wt !== target) continue;
      const r = parseInt(e.sets[i].reps) || 0;
      // `>=` means a later set with equal reps replaces the earlier one
      // (latest-position wins on full tie).
      if (r >= bestReps) { bestReps = r; bestIdx = i; }
    }
    if (bestIdx >= 0) out[e.name] = bestIdx;
  }
  return out;
}

function computeWorkoutTotals(workout) {
  let volumeKg = 0, sets = 0;
  const names = new Set();
  for (const e of workout.exercises || []) {
    if (!e.sets?.length) continue;
    names.add(e.name);
    for (const s of e.sets) {
      volumeKg += (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0);
      sets++;
    }
  }
  const display = isImperial() ? volumeKg * KG_TO_LB : volumeKg;
  return { volume: Math.round(display), exercises: names.size, sets };
}

// Truncate text to fit width, appending a single-character ellipsis. We do
// this by hand because canvas has no built-in text overflow.
function drawTextEllipsis(ctx, text, x, y, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) { ctx.fillText(text, x, y); return; }
  let t = text;
  const ell = "…";
  while (t.length > 0 && ctx.measureText(t + ell).width > maxWidth) t = t.slice(0, -1);
  ctx.fillText(t + ell, x, y);
}

// Render a square 1080×1080 share card. Returns the canvas element (not yet
// in the DOM). Pure paint — no event handlers, no global state mutations.
function buildShareCanvas(workout, history) {
  const W = 1080, H = 1080, PAD = 60;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  ctx.textBaseline = "top";

  // Background + accent stripe
  ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#0ea5e9"; ctx.fillRect(0, 0, W, 8);

  // Header: preset emoji + label
  const p = P[workout.preset];
  let y = 80;
  ctx.fillStyle = "#e2e8f0";
  ctx.font = "bold 56px system-ui, -apple-system, sans-serif";
  drawTextEllipsis(ctx, p ? `${p.emoji} ${p.label}` : workout.preset, PAD, y, W - 2 * PAD);
  y += 70;
  ctx.fillStyle = "#94a3b8";
  ctx.font = "32px system-ui, -apple-system, sans-serif";
  const durTxt = fmtDuration(workout.duration);
  const headerSub = durTxt ? `${workout.date} · ⏱ ${durTxt}` : workout.date;
  ctx.fillText(headerSub, PAD, y);
  y += 56;

  // Divider
  ctx.fillStyle = "#334155";
  ctx.fillRect(PAD, y, W - 2 * PAD, 2);
  y += 30;

  // Exercises with PR badges
  const prMap = computePRMap(history);
  const prIdx = computePRBadgeIndices(workout, prMap);
  const wUnit = weightUnit();
  const exercises = (workout.exercises || []).filter(e => e.sets?.length);
  // v0.16: render every populated cardio block as its own line.
  const cardioLines = get有氧s(workout)
    .filter(cardioHasData)
    .map(c => `🏃 ${c.type || "有氧"} · ${summarize有氧(c)}`);
  // Reserve 220 px at the bottom for totals + wordmark
  const bottomReserve = 220;
  for (const e of exercises) {
    if (y > H - bottomReserve - 90) { ctx.fillStyle = "#94a3b8"; ctx.font = "24px system-ui, -apple-system, sans-serif"; ctx.fillText("…", PAD, y); break; }
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "bold 32px system-ui, -apple-system, sans-serif";
    drawTextEllipsis(ctx, e.name + (e.alternativeOf ? " · alt" : ""), PAD, y, W - 2 * PAD);
    y += 42;
    const setsTxt = e.sets.map((s, i) => {
      const isPR = i === prIdx[e.name];
      return `${fmtW(s.weight)}${wUnit}×${s.reps}${isPR ? " 🏆" : ""}`;
    }).join("   ");
    ctx.fillStyle = "#cbd5e1";
    ctx.font = "28px ui-monospace, SFMono-Regular, monospace";
    drawTextEllipsis(ctx, setsTxt, PAD, y, W - 2 * PAD);
    y += 52;
  }

  for (const line of cardioLines) {
    if (y > H - bottomReserve - 50) break;
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "bold 32px system-ui, -apple-system, sans-serif";
    drawTextEllipsis(ctx, line, PAD, y, W - 2 * PAD);
    y += 50;
  }

  // Totals
  const totals = computeWorkoutTotals(workout);
  ctx.fillStyle = "#94a3b8";
  ctx.font = "bold 28px system-ui, -apple-system, sans-serif";
  const totalsBase = `Total: ${fmtW(totals.volume)} ${wUnit} · ${totals.exercises} exercise${totals.exercises === 1 ? "" : "s"} · ${totals.sets} set${totals.sets === 1 ? "" : "s"}`;
  ctx.fillText(durTxt ? `${totalsBase} · ⏱ ${durTxt}` : totalsBase, PAD, H - 130);

  // Pseudo-link wordmark: "github.com/zerotonin/flatgym" with the host/owner
  // path muted and "flatgym" in the accent colour, so it visually reads as a
  // link even though it's just two text segments painted side-by-side.
  ctx.font = "bold 32px system-ui, -apple-system, sans-serif";
  const linkPrefix = "github.com/zerotonin/";
  const linkApp = "flatgym";
  ctx.textAlign = "right";
  ctx.fillStyle = "#0ea5e9";
  ctx.fillText(linkApp, W - PAD, H - 80);
  const appW = ctx.measureText(linkApp).width;
  ctx.fillStyle = "#94a3b8";
  ctx.fillText(linkPrefix, W - PAD - appW, H - 80);
  ctx.textAlign = "left";

  return canvas;
}

function buildShareText(workout, history) {
  const p = P[workout.preset];
  const prMap = computePRMap(history);
  const prIdx = computePRBadgeIndices(workout, prMap);
  const wUnit = weightUnit();
  const lines = [];
  lines.push(`${p ? p.emoji + " " + p.label : workout.preset} · ${workout.date}`);
  lines.push("");
  for (const e of (workout.exercises || [])) {
    if (!e.sets?.length) continue;
    const sets = e.sets.map((s, i) => {
      const isPR = i === prIdx[e.name];
      return `${fmtW(s.weight)}${wUnit}×${s.reps}${isPR ? " 🏆" : ""}`;
    }).join(", ");
    const altMark = e.alternativeOf ? " (alt)" : "";
    lines.push(`${e.name}${altMark}: ${sets}`);
  }
  for (const c of get有氧s(workout)) {
    if (cardioHasData(c)) {
      lines.push(`🏃 ${c.type || "有氧"} · ${summarize有氧(c)}`);
    }
  }
  lines.push("");
  const t = computeWorkoutTotals(workout);
  const dur = fmtDuration(workout.duration);
  const totalLine = `Total: ${fmtW(t.volume)} ${wUnit} · ${t.exercises} exercise${t.exercises === 1 ? "" : "s"} · ${t.sets} set${t.sets === 1 ? "" : "s"}`;
  lines.push(dur ? `${totalLine} · ⏱ ${dur}` : totalLine);
  lines.push("github.com/zerotonin/flatgym");
  return lines.join("\n");
}

function openShareModal() {
  const id = S.modal?.workoutId;
  if (!id) { S.modal = null; render(); return; }
  const h = ld();
  const w = h.find(x => x.id === id);
  if (!w) { S.modal = null; render(); return; }
  SHARE_CTX = {
    canvas: buildShareCanvas(w, h),
    text: buildShareText(w, h),
    filename: `flatgym-${w.date}-${w.preset}.png`,
  };
  S.modal = { type: "share", workoutId: id };
  render();
}

function closeShareModal() {
  if (S.modal?.type === "share") S.modal = null;
  SHARE_CTX = null;
  render();
}

function shareCurrentCanvas() {
  if (!SHARE_CTX) return;
  const { canvas, filename, text } = SHARE_CTX;
  canvas.toBlob(async (blob) => {
    if (!blob) { toast("图片生成失败"); return; }
    const file = new File([blob], filename, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], text }); }
      catch (e) { if (e && e.name !== "AbortError") toast("分享失败"); }
    } else {
      toast("Share not available — try Copy or Download");
    }
  }, "image/png");
}

function copyCurrentImage() {
  if (!SHARE_CTX) return;
  SHARE_CTX.canvas.toBlob(async (blob) => {
    if (!blob) { toast("图片生成失败"); return; }
    try {
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      toast("Image copied");
    } catch {
      toast("Image copy not supported — try Download");
    }
  }, "image/png");
}

function downloadCurrentImage() {
  if (!SHARE_CTX) return;
  const { canvas, filename } = SHARE_CTX;
  canvas.toBlob((blob) => {
    if (!blob) { toast("图片生成失败"); return; }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Downloaded");
  }, "image/png");
}

async function copyCurrentText() {
  if (!SHARE_CTX) return;
  try {
    await navigator.clipboard.writeText(SHARE_CTX.text);
    toast("Text copied");
  } catch {
    toast("复制失败");
  }
}

// v0.18: shared add-exercise handler. Used both by the edit-view's + button
// (where there's no draft to touch) and the live workout's "+ Add exercise
// (this workout only)" button (where touch() autosaves the draft so a tab
// close doesn't lose the freshly-added card). Either way the preset's
// default exercise list is untouched — this only mutates the in-progress
// S.exercises.
function addExerciseToWorkout(btnEl) {
  if (!btnEl) { render(); return; }
  const editing = S.view === "edit";
  openAutocomplete(btnEl, "", {
    commit: (name) => {
      if (!name) { render(); return; }
      S.exercises.push({ name: name.trim(), sets: [] });
      if (!editing) touch();
      render();
    },
    cancel: () => render(),
  });
}
// Back-compat alias — old data-testid / onclick still work.
const add编辑Exercise = addExerciseToWorkout;

function rm编辑Exercise(ei) {
  if (!confirm(`Remove "${S.exercises[ei].name}" from this workout?`)) return;
  S.exercises.splice(ei, 1);
  render();
}

  if (!btnEl || !S.preset编辑Buf) { render(); return; }

function renamePresetExercise(i, spanEl) {
  if (!S.preset编辑Buf) return;
  const cur = S.preset编辑Buf.ex[i];
  if (!spanEl) { render(); return; }
  openAutocomplete(spanEl, cur, {
    commit: (name) => {
      const trimmed = (name || "").trim();
      if (trimmed) S.preset编辑Buf.ex[i] = trimmed;
      render();
    },

  });
}

function rmPresetExercise(i) {
  S.preset编辑Buf.ex.splice(i, 1);
  render();
}

function movePresetExercise(i, delta) {
  const j = i + delta;
  if (j < 0 || j >= S.preset编辑Buf.ex.length) return;
  const arr = S.preset编辑Buf.ex;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  render();
}

function savePreset编辑() {
  const buf = S.preset编辑Buf;
  if (!buf) return;
  const label = (buf.label || "").trim();
  if (!label) { toast("Preset needs a name"); return; }
  const emoji = (buf.emoji || "").trim() || "💪";
  let key = S.preset编辑ingKey;
  if (key === "__new__") key = mkPresetKey();
  P[key] = { label, emoji, ex: buf.ex.slice(), cardio: buf.cardio !== false };
  svPresets();
  S.preset编辑ingKey = null;
  S.preset编辑Buf = null;
  S.view = "home";
  render();
  toast("Preset saved");
}

function deletePreset() {
  const key = S.preset编辑ingKey;
  if (!key || key === "__new__") return;
  if (S.preset === key) { toast("请先取消当前训练"); return; }
  const p = P[key];
  const usedCount = ld().filter(w => w.preset === key).length;
  const extra = usedCount ? `\n\n${usedCount} past workout${usedCount === 1 ? "" : "s"} used this preset. They'll stay in your history but the label will fall back to "${key}".` : "";
  if (!confirm(`删除 preset "${p?.label || key}"?${extra}`)) return;
  delete P[key];
  svPresets();
  S.preset编辑ingKey = null;
  S.preset编辑Buf = null;
  S.view = "home";
  render();
  toast("Preset deleted");
}

function resumeDraft() {
  const d = ldDraft();
  if (!d) return;
  S = Object.assign({ view: "workout", saved: false, modal: null }, d, { view: "workout", modal: null });
  // v0.16: drafts saved with the legacy single-cardio shape get bridged
  // here so we never end up with S.cardio (string) and S.cardios (undefined).
  if (!Array.isArray(S.cardios)) S.cardios = S.cardio ? [S.cardio] : [];
  delete S.cardio;
  render();
}

function discardDraft() {
  if (confirm("放弃未保存的训练？")) {
    clearDraft();
    render();
  }
}

function openAltPicker(ei) {
  const ex = S.exercises[ei];
  if (!ex) return;
  // Use the exercise's original-source name for the alternatives map: a
  // shifted-in card uses ex.name; a card already swapped to an alternative
  // uses ex.alternativeOf so further picks share the same memory bucket.
  const origName = ex.alternativeOf || ex.name;
  S.modal = { type: "alt-picker", exerciseIndex: ei, exerciseName: origName };
  render();
}
function closeAltPicker() {
  if (S.modal?.type === "alt-picker") S.modal = null;

// Inline alt-suggest chip handler — same swap logic as pickAlt, but invoked
// directly from the exercise card without opening the alt-picker modal.
function quickPickAlt(ei, altName) {
  const ex = S.exercises[ei];
  if (!ex) return;
  if (ex.sets?.length && !confirm(`This card already has ${ex.sets.length} logged set${ex.sets.length === 1 ? "" : "s"} — replace and discard them?`)) return;
  const origName = ex.alternativeOf || ex.name;
  rememberAlt(origName, altName);
  ex.name = altName;
  ex.alternativeOf = origName;
  ex.sets = [];
  touch();
  render();
  toast("Switched to " + altName);
}
function pickAlt(altName) {
  if (!S.modal || S.modal.type !== "alt-picker") return;
  const ei = S.modal.exerciseIndex;
  const ex = S.exercises[ei];
  if (!ex) { S.modal = null; render(); return; }
  if (ex.sets?.length && !confirm(`This card already has ${ex.sets.length} logged set${ex.sets.length === 1 ? "" : "s"} — replace and discard them?`)) return;
  const origName = ex.alternativeOf || ex.name;
  rememberAlt(origName, altName);
  ex.name = altName;
  ex.alternativeOf = origName;
  ex.sets = [];
  S.modal = null;
  touch();
  render();
  toast("Switched to " + altName);
}
function forgetAltFromPicker(altName) {
  if (!S.modal || S.modal.type !== "alt-picker") return;
  if (!confirm(`Forget "${altName}" as an alternative? Past workouts that already used it stay in your history.`)) return;
  forgetAlt(S.modal.exerciseName, altName);
  render();
}
function openAltAdd(btnEl, ei) {
  // Replace the "+ 添加新替代动作" button with an autocomplete input.
  // On commit, remember the new name, swap the card to it, and close.
  const origName = S.modal?.exerciseName;
  if (!origName) return;
  openAutocomplete(btnEl, "", {
    title: "替代动作",
    commit: (name) => {
      const trimmed = (name || "").trim();
      if (!trimmed) { render(); return; }
      // Apply via the same path so the confirm-on-existing-sets logic is shared.
      // We need to set the modal pointer back so pickAlt can find ei+origName.
      S.modal = { type: "alt-picker", exerciseIndex: ei, exerciseName: origName };
      pickAlt(trimmed);
    },
    cancel: () => render(),
  });
}

function renderToolsModal() {
  const imperial = isImperial();
  const unit = imperial ? "lb" : "kg";
  const plates = imperial ? PLATES_LB : PLATES_KG;
  const bars = imperial ? BARS_LB : BARS_KG;

  // ── Plate calculator ──────────────────────────────────────────────
  const tIn = S.tools.plate.target;
  const barIn = S.tools.plate.bar || bars[0];
  const tNum = parseFloat(tIn);
  let plateBlock = `<p class="tools-result muted">Enter a target weight to see the plate breakdown.</p>`;
  if (tIn !== "" && Number.isFinite(tNum)) {
    if (tNum < barIn) {
      plateBlock = `<p class="tools-result err">Target (${tNum} ${unit}) is lighter than the bar (${barIn} ${unit}).</p>`;
    } else {
      // For lb mode the algorithm uses kg internally so the same plate
      // helper works; convert in/out at the boundary.
      const targetKg = imperial ? tNum / 2.20462 : tNum;
      const barKg = imperial ? barIn / 2.20462 : barIn;
      const perSideKg = (targetKg - barKg) / 2;
      const { picks, residual } = plateBreakdown(perSideKg, plates);
      const perSideDisplay = imperial ? perSideKg * 2.20462 : perSideKg;
      const pickWeights = picks.map(p => imperial ? p.lb : p.kg);
      const residualDisplay = imperial ? residual * 2.20462 : residual;
      const fmt = (n) => Number.isInteger(n * 4) ? (Math.round(n * 100) / 100).toString().replace(/\.00?$/, "") : n.toFixed(2);
      const headline = picks.length
        ? `Per side: ${pickWeights.map(fmt).join(" + ")} ${unit}`
        : `Per side: just the bar (no plates)`;
      const residualLine = residual > 0.05
        ? `<div class="err">Cannot reach exactly with available plates — short by ${fmt(residualDisplay)} ${unit} per side.</div>`
        : "";
      // Visual: a tiny barbell. Plate width scales with weight; bar is a thin
      // grey rectangle in the middle. Symmetrical, biggest plates outermost.
      const plateBars = picks.map(p => {
        const w = imperial ? p.lb : p.kg;
        const h = 30 + Math.min(30, w * 1.3);
        const px = Math.max(8, Math.min(20, 6 + w * 0.4));
        const ink = ["#facc15","#f8fafc","#94a3b8"].includes(p.color) ? "#0f172a" : "#fff";
        return `<span class="pl" style="background:${p.color};width:${px}px;height:${h}px;color:${ink}">${fmt(w)}</span>`;
      });
      const left = plateBars.slice().reverse().join("");
      const right = plateBars.join("");
      plateBlock = `
        <div class="tools-result">
          ${headline}
          <div class="muted">Bar ${fmt(barIn)} + 2 × ${fmt(perSideDisplay)} = ${fmt(tNum)} ${unit}</div>
          ${residualLine}
        </div>
        <div class="plate-strip">${left}<span class="bar"></span>${right}</div>`;
    }
  }

  const barChips = bars.map(b => {
    const sel = b === barIn ? " on" : "";
    return `<button class="tools-bar${sel}" data-testid="tools-bar-${b}" onclick="setToolsPlateBar(${b})">${b} ${unit}</button>`;
  }).join("");

  // ── 1RM estimator + percentage table ──────────────────────────────
  const oW = S.tools.orm.weight;
  const oR = S.tools.orm.reps;
  const oneRM = estimate1RM(oW, oR);
  let ormBlock;
  if (oneRM === null) {
    if (parseFloat(oW) < 0) {
      ormBlock = `<p class="tools-result muted">— (1RM estimation doesn't apply to assisted lifts.)</p>`;
    } else {
      ormBlock = `<p class="tools-result muted">Enter a weight × reps to estimate 1RM.</p>`;
    }
  } else {
    const round = (kg) => {
      const step = imperial ? 5 : 2.5;
      return Math.round(kg / step) * step;
    };
    const pcts = [100, 95, 90, 85, 80, 75, 70, 65, 60];
    const rows = pcts.map(pct => {
      const v = round(oneRM * pct / 100);
      const cls = pct === 100 ? "pct-row-100" : "";
      return `<span class="pct-label ${cls}">${pct}%</span><span class="pct-val ${cls}">${v} ${unit}</span>`;
    }).join("");
    ormBlock = `
      <div class="tools-result">
        Estimated 1RM: <b>${round(oneRM)} ${unit}</b> <span class="muted">(Epley)</span>
      </div>
      <div class="pct-grid">${rows}</div>`;
  }

  // ── 卡路里 estimator ────────────────────────────────────────────
  // 体重 prefills from the latest 体重 body-measurement when
  // the user hasn't typed anything yet. Activity is a MET-table dropdown.
  const calIn = S.tools.cal;
  if (calIn.bodyweight === "" && !calIn._touchedBw) {
    const lbw = latest体重();
    if (lbw) {
      // Convert if the stored bodyweight unit doesn't match the display unit.
      const dispUnit = imperial ? "lb" : "kg";
      const stored = lbw.unit?.toLowerCase().includes("lb") ? "lb" : "kg";
      let v = lbw.value;
      if (stored !== dispUnit) v = stored === "kg" ? v * 2.20462 : v / 2.20462;
      calIn.bodyweight = v.toFixed(1);
      calIn._fromHistory = true;
    }
  }
  const calActivityOpts = [`<option value="">— pick activity —</option>`]
    .concat(MET_TABLE.map(m => `<option value="${m.key}" ${calIn.activity === m.key ? "selected" : ""}>${escHTML(m.label)}</option>`))
    .join("");
  const kcal = estimate卡路里(calIn.activity, calIn.bodyweight, calIn.minutes, imperial);
  let calBlock;
  if (!calIn.activity) {
    calBlock = `<p class="tools-result muted">Pick an activity, enter your bodyweight + minutes.</p>`;
  } else if (kcal === null) {
    calBlock = `<p class="tools-result muted">Enter bodyweight + minutes to estimate.</p>`;
  } else {
    const met = MET_TABLE.find(m => m.key === calIn.activity);
    calBlock = `
      <div class="tools-result">
        Estimated burn: <b>~${Math.round(kcal)} kcal</b>
        <div class="muted">${met.met} MET × ${calIn.bodyweight} ${imperial ? "lb" : "kg"} × ${calIn.minutes} min ÷ 60</div>
        <div class="muted" style="margin-top:6px;font-size:11px">MET tables are population estimates, not personal accuracy. Real burn varies with intensity, terrain, fitness level, and metabolism.</div>
      </div>`;
  }

  // ── Riegel time predictor ─────────────────────────────────────────
  // Distance unit follows the user's metric/imperial setting; the formula
  // is unit-agnostic as long as both distance inputs use the same one.
  const distUnit = imperial ? "mi" : "km";
  const rPrev = S.tools.riegel.prevDistance;
  const rPrevT = S.tools.riegel.prevTime;
  const rTgt = S.tools.riegel.targetDistance;
  const predicted = predictRiegel(rPrev, rPrevT, rTgt);
  const riegelBlock = (predicted !== null)
    ? `<div class="tools-result">Predicted time: <b>${fmtMinutes(predicted)}</b> <span class="muted">(${parseFloat(rTgt)} ${distUnit})</span></div>`
    : `<p class="tools-result muted">Enter both a previous (distance, time) and a target distance.</p>`;

  return `
    <div class="modal-bg" data-testid="tools-modal" onclick="closeTools()">
      <div class="modal-box modal-box--wide" onclick="event.stopPropagation()">
        <div class="modal-title">🛠 Tools</div>

        <div class="tools-section">
          <p class="tools-h">⚖ Plate calculator</p>
          <div class="tools-row">
            <label>Target</label>
            <input type="number" inputmode="decimal" value="${escHTML(tIn)}" onchange="setToolsPlateTarget(this.value)" data-testid="tools-plate-target">
            <span class="muted">${unit}</span>
          </div>
          <div class="tools-row">
            <label>Bar</label>
            <div class="tools-bars">${barChips}</div>
          </div>
          ${plateBlock}
        </div>

        <div class="tools-section">
          <p class="tools-h">📐 1RM estimator <button class="formula-help" data-testid="formula-help-epley" title="这是什么？" aria-label="关于 Epley 公式" onclick="openFormulaModal('epley')">❓</button></p>
          <div class="tools-row">
            <input type="number" inputmode="decimal" placeholder="weight" value="${escHTML(oW)}" onchange="setToolsORM('weight', this.value)" data-testid="tools-orm-weight">
            <span class="muted">${unit}</span>
            <span class="muted">×</span>
            <input type="number" inputmode="numeric" placeholder="reps" value="${escHTML(oR)}" onchange="setToolsORM('reps', this.value)" data-testid="tools-orm-reps">
            <span class="muted">reps</span>
          </div>
          ${ormBlock}
        </div>

        <div class="tools-section">
          <p class="tools-h">🔥 卡路里 estimator</p>
          <div class="tools-row">
            <label>Activity</label>
            <select class="sel" data-testid="tools-cal-activity" style="flex:1 1 100%;min-width:0" onchange="setToolsCal('activity', this.value)">${calActivityOpts}</select>
          </div>
          <div class="tools-row">
            <label>体重</label>
            <input type="number" inputmode="decimal" step="0.1" placeholder="${imperial ? "lb" : "kg"}" value="${escHTML(calIn.bodyweight)}" onchange="S.tools.cal._touchedBw=true;setToolsCal('bodyweight', this.value)" data-testid="tools-cal-bw" style="width:90px">
            <span class="muted">${imperial ? "lb" : "kg"}</span>
            <span class="muted">·</span>
            <input type="number" inputmode="decimal" step="0.1" placeholder="min" value="${escHTML(calIn.minutes)}" onchange="setToolsCal('minutes', this.value)" data-testid="tools-cal-min" style="width:72px">
            <span class="muted">min</span>
          </div>
          ${calBlock}
        </div>

        <div class="tools-section">
          <p class="tools-h">🏃 Riegel time predictor <button class="formula-help" data-testid="formula-help-riegel" title="这是什么？" aria-label="关于 Riegel 公式" onclick="openFormulaModal('riegel')">❓</button></p>
          <div class="tools-row">
            <label>Previous</label>
            <input type="number" inputmode="decimal" step="0.01" placeholder="dist" value="${escHTML(rPrev)}" onchange="setToolsRiegel('prevDistance', this.value)" data-testid="tools-riegel-prev-dist" style="width:72px">
            <span class="muted">${distUnit}</span>
            <span class="muted">in</span>
            <input type="number" inputmode="decimal" step="0.1" placeholder="min" value="${escHTML(rPrevT)}" onchange="setToolsRiegel('prevTime', this.value)" data-testid="tools-riegel-prev-time" style="width:72px">
            <span class="muted">min</span>
          </div>
          <div class="tools-row">
            <label>Target</label>
            <input type="number" inputmode="decimal" step="0.01" placeholder="dist" value="${escHTML(rTgt)}" onchange="setToolsRiegel('targetDistance', this.value)" data-testid="tools-riegel-target" style="width:72px">
            <span class="muted">${distUnit}</span>
          </div>
          ${riegelBlock}
        </div>

        <button class="modal-cancel" onclick="closeTools()">Close</button>
      </div>
    </div>`;
}

function setRestEnabled(on) {
  const r = ldRest();
  r.enabled = !!on;
  svRest(r);
  if (!on) stopRestTimer();

function setRestDuration(secs) {
  const r = ldRest();
  const n = parseInt(secs) || REST_DEFAULT.durationSec;
  r.durationSec = Math.max(10, Math.min(600, n));
  svRest(r);
}

function statsPrevMonth() { S.statsMonthOffset = (S.statsMonthOffset || 0) - 1; render(); }
function statsNextMonth() { S.statsMonthOffset = (S.statsMonthOffset || 0) + 1; render(); }

function setBackup踏频(c) {
  const b = ldBackup();
  b.cadence = (c === "daily" || c === "每周" || c === "每月") ? c : "off";
  svBackup(b);
  render();
}
function setBackupDayOfWeek(dow) {
  const b = ldBackup();
  b.dayOfWeek = Math.max(0, Math.min(6, dow | 0));
  // Selecting a day implies the user wants 每周 cadence — auto-promote.
  if (b.cadence !== "每周") b.cadence = "每周";
  svBackup(b);
  render();
}
function setBackupDayOfMonth(dom) {
  const b = ldBackup();
  b.dayOfMonth = Math.max(1, Math.min(28, dom | 0));
  if (b.cadence !== "每月") b.cadence = "每月";
  svBackup(b);
  render();
}
function dismissBackupBanner() {
  dismissBackupNag();
  render();
}

// ── Body measurement actions (v0.8) ──
function openBodyLog() {
  S.modal = { type: "body-log", name: "", value: "", unit: "kg", date: tod() };
  render();
  setTimeout(() => { const el = document.querySelector('[data-testid="body-name"]'); if (el) el.focus(); }, 0);
}
function openBodyLogForName(_btnEl, name) {
  // Prefill unit from the latest entry for this name so logging a repeat is one field.
  const last = ldBody().filter(e => e.name === name).sort((a, b) => a.date.localeCompare(b.date)).pop();
  S.modal = { type: "body-log", name, value: "", unit: last?.unit || "kg", date: tod() };
  render();
  setTimeout(() => { const el = document.querySelector('[data-testid="body-value"]'); if (el) el.focus(); }, 0);
}
function closeBodyLog() {
  if (S.modal?.type === "body-log") S.modal = null;
  render();
}
// When user picks a previously-used name from the datalist, prefill its unit.
function onBodyNameInput(val) {
  if (!S.modal || S.modal.type !== "body-log") return;
  S.modal.name = val;
  const trimmed = val.trim();
  if (!trimmed) return;
  const last = ldBody().filter(e => e.name === trimmed).sort((a, b) => a.date.localeCompare(b.date)).pop();
  if (last) {
    const u = document.querySelector('[data-testid="body-unit"]');
    if (u && (!u.value || u.value === "kg" || u.value === S.modal.unit)) {
      u.value = last.unit || "";
      S.modal.unit = u.value;
    }
  }
}
function saveBodyLog() {
  const nameEl = document.querySelector('[data-testid="body-name"]');
  const valEl = document.querySelector('[data-testid="body-value"]');
  const unitEl = document.querySelector('[data-testid="body-unit"]');
  const dateEl = document.querySelector('[data-testid="body-date"]');
  const name = (nameEl?.value || "").trim();
  const value = (valEl?.value || "").trim();
  const unit = (unitEl?.value || "").trim();
  const date = (dateEl?.value || "").trim() || tod();
  if (!name) { toast("Give it a name"); return; }
  if (!value) { toast("输入数值"); return; }
  const arr = ldBody();
  arr.push({ id: mkBodyId(), date, name, value, unit });
  svBody(arr);
  S.modal = null;
  render();
  toast("保存d");
}
function deleteBodyEntry(id) {
  if (!confirm("删除此记录？")) return;
  svBody(ldBody().filter(e => e.id !== id));
  render();
  toast("记录已删除");
}

function applyShift(toPreset) {
  if (!S.modal || S.modal.type !== "shift") return;
  const exName = S.modal.exerciseName;
  addShift(exName, S.preset, S.date, toPreset);
  // Make the action visually decisive: if the exercise hasn't been logged
  // yet (no sets), drop its card from the current session so the user can
  // see the shift took effect without having to save first. Keeps the
  // shift record in localStorage either way; cancel from the home shift
  // card if you change your mind.
  const idx = S.exercises.findIndex(e => e.name === exName && !e.shiftId);
  if (idx >= 0 && !(S.exercises[idx].sets?.length)) {
    S.exercises.splice(idx, 1);
    touch();
  }
  S.modal = null;
  render();
  toast("Shifted to " + shiftTargetLabel(toPreset));
}

function cancelShiftById(id) {
  svShifts(ldShifts().filter(s => s.id !== id));
  // Also drop it from S.exercises if it was appended as shifted-in
  S.exercises = S.exercises.filter(e => e.shiftId !== id);
  render();
  toast("Shift cancelled");
}

// BUG-3: typed-phrase confirmation so a single mistap can't wipe history.
function resetHistory() {
  const typed = prompt("删除全部训练历史？\n输入 DELETE 确认：");
  if (typed === "DELETE") {
    sv([]);
    clearDraft();
    render();
    toast("History deleted");
  }
}

// On load: if a draft exists, restore S so the Resume banner is meaningful.
(function bootFromDraft() {
  const d = ldDraft();
  if (d?.preset && d?.exercises) {
    S = Object.assign({ view: "home", saved: false, modal: null }, d, { view: "home", modal: null });
    // Same legacy bridge as resumeDraft() — older drafts predate cardios array.
    if (!Array.isArray(S.cardios)) S.cardios = S.cardio ? [S.cardio] : [];
    delete S.cardio;
  }
})();

render();

// PWA: register the service worker so the app is installable and works
// offline. 跳过ped on file:// (SWs aren't supported there) and gracefully
// no-ops on browsers without serviceWorker support.
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => { /* ignore — app still works without it */ });
  });
}
</script>
</body>
</html>
